<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGUM - Gestão U.Móveis SENAI</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (UMD - Navegador) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel para compilação do JSX em tempo real no navegador -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <!-- Dependências essenciais do Recharts para evitar o erro 'ForwardRef' -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>

    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js" crossorigin></script>
</head>
<body class="bg-slate-100 overflow-hidden text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-presets="env" data-plugins="transform-react-jsx">
        const { useState, useMemo, useEffect } = window.React;
        const { 
          BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, ResponsiveContainer,
          PieChart, Pie, Cell, LabelList
        } = window.Recharts;

        const ESCOLAS_SENAI = [
            "FATEC SENAI Ítalo Bologna", "SENAI Vila Canaã", "SENAI Anápolis", 
            "SENAI Rio Verde", "SENAI Catalão", "SENAI Itumbiara", "SENAI Trindade",
            "SENAI Aparecida de Goiânia", "SENAI Niquelândia", "SENAI Minaçu", "SENAI Quirinópolis"
        ];

        const STATUS_COLORS = {
          'Agendado': '#3b82f6', 
          'Em Andamento': '#10b981', 
          'Concluído': '#6b7280', 
          'Manutenção': '#ef4444', 
        };

        const FROTA_DATA = [
          { cod: 'Soldagem', unidade: 'SOLDAGEM', area: 'Metalmecânica', origem: 'BNDS', status: 'OPERACIONAL', placa: 'JFP-8605', categoria: 'CARRETA', tempo: 11, ar: 2 },
          { cod: 'Panificação', unidade: 'PANIFICAÇÃO', area: 'Alimentos', origem: 'BNDS', status: 'OPERACIONAL', placa: 'JKF-9711', categoria: 'CARRETA', tempo: 11, ar: 4 },
          { cod: 'Panificação Básica', unidade: 'MULTIFUNCIONAL 5 - CARRETA E', area: 'Alimentos', origem: 'SENAI GO', status: 'REFORMA', placa: 'KBX-5501', categoria: 'CARRETA', tempo: 39, ar: 2 },
          { cod: 'Refrigeração', unidade: 'MULTIFUNCIONAL 4 - CARRETA D', area: 'Refrigeração', origem: 'SENAI GO', status: 'REFORMA', placa: 'KBZ-4221', categoria: 'CARRETA', tempo: 41, ar: 2 },
          { cod: 'Instalações Elétricas', unidade: 'MULTIFUNCIONAL 3 - CARRETA C', area: 'Eletroeletrônica', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'KBZ-4611', categoria: 'CARRETA', tempo: 41, ar: 2 },
          { cod: 'Mecânica Diesel', unidade: 'MULTIFUNCIONAL 6 - CARRETA F', area: 'Automotiva', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'KCG-5255', categoria: 'CARRETA', tempo: 41, ar: 2 },
          { cod: 'Mec. Motocicletas', unidade: 'MULTIFUNCIONAL 7 - CARRETA G', area: 'Automotiva', origem: 'SENAI GO', status: 'REFORMA', placa: 'KDL-3081', categoria: 'CARRETA', tempo: 25, ar: 2 },
          { cod: 'Módulo ESCOLA MÓVEL', unidade: 'ESCOLA MÓVEL - CONTÊINERS', area: 'Multidisciplinar', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'ND', categoria: 'CONTEINERS', tempo: 2024, ar: 5 },
          { cod: 'Educon SESI', unidade: 'Multifuncional SESI EDUCON', area: 'Educação Básica', origem: 'SESI GO', status: 'OPERACIONAL', placa: 'OGU-2707', categoria: 'CAMINHÃO', tempo: 12, ar: 2 },
          { cod: 'CAVALO MECÂNICO', unidade: 'CAMINHÃO VW 19.330 ADVANTECH', area: 'Logística', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'OMW-0073', categoria: 'CAVALO MEC.', tempo: 10, ar: 0 },
          { cod: 'Mecânica Industrial', unidade: 'MANUTENÇÃO INDUSTRIAL', area: 'Metalmecânica', origem: 'BNDS', status: 'OPERACIONAL', placa: 'OZW-6455', categoria: 'CARRETA', tempo: 9, ar: 4 },
          { cod: 'Manut. Máquinas Agrícolas', unidade: 'MANUT. MÁQUINAS AGRÍCOLAS', area: 'Mecânica Agrícola', origem: 'BNDS', status: 'MANUTENÇÃO', placa: 'PAC-9658', categoria: 'CARRETA', tempo: 9, ar: 4 },
          { cod: 'Multi 2 - simples', unidade: 'MULTIFUNCIONAL 1 - CARRETA A', area: 'Multidisciplinar', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'SDK0J77', categoria: 'CARRETA', tempo: 2024, ar: 2 },
          { cod: 'Multi 1 - com avanço', unidade: 'MULTIFUNCIONAL 2 - CARRETA B', area: 'Multidisciplinar', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'SDK1A17', categoria: 'CARRETA', tempo: 2024, ar: 4 }
        ];

        const INITIAL_DATA = [
          { id: 1, um: 'Soldagem', area: 'Metalmecânica', escola: 'FATEC SENAI Ítalo Bologna', municipio: 'Goiânia', inicio: '2026-06-10', fim: '2026-07-20', status: 'Em Andamento', matriculas: 120, cargaHoraria: 160, receita: 64000, impactoSocial: false },
          { id: 2, um: 'Panificação', area: 'Alimentos', escola: 'SENAI Vila Canaã', municipio: 'Aparecida de Goiânia', inicio: '2026-06-01', fim: '2026-06-30', status: 'Em Andamento', matriculas: 80, cargaHoraria: 200, receita: 80000, impactoSocial: false },
          { id: 3, um: 'Módulo ESCOLA MÓVEL', area: 'Multidisciplinar', escola: 'SENAI Anápolis', municipio: 'Anápolis', inicio: '2026-07-05', fim: '2026-08-15', status: 'Agendado', matriculas: 150, cargaHoraria: 80, receita: 32000, impactoSocial: true },
          { id: 4, um: 'Mecânica Diesel', area: 'Automotiva', escola: 'SENAI Rio Verde', municipio: 'Rio Verde', inicio: '2026-05-15', fim: '2026-06-15', status: 'Concluído', matriculas: 90, cargaHoraria: 120, receita: 48000, impactoSocial: false },
        ];

        const MESES_OPCOES = [
          { value: '2026-01-01', label: 'Janeiro / 2026' }, { value: '2026-02-01', label: 'Fevereiro / 2026' },
          { value: '2026-03-01', label: 'Março / 2026' }, { value: '2026-04-01', label: 'Abril / 2026' },
          { value: '2026-05-01', label: 'Maio / 2026' }, { value: '2026-06-01', label: 'Junho / 2026' },
          { value: '2026-07-01', label: 'Julho / 2026' }, { value: '2026-08-01', label: 'Agosto / 2026' },
          { value: '2026-09-01', label: 'Setembro / 2026' }, { value: '2026-10-01', label: 'Outubro / 2026' },
          { value: '2026-11-01', label: 'Novembro / 2026' }, { value: '2026-12-01', label: 'Dezembro / 2026' }
        ];

        const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        const formatDate = (dateStr) => {
          if (!dateStr) return '';
          const [y, m, d] = dateStr.split('-');
          return `${d}/${m}/${y}`;
        };
        const getDaysBetween = (start, end) => {
          const d1 = new Date(start);
          const d2 = new Date(end);
          return Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
        };

        const evaluateStatus = (inicio, fim, manualStatus) => {
            if (manualStatus === 'Manutenção') return 'Manutenção';
            
            const today = new Date();
            today.setHours(0,0,0,0);
            const startDate = new Date(`${inicio}T00:00:00`);
            const endDate = new Date(`${fim}T00:00:00`);

            if (endDate < today) return 'Concluído';
            if (startDate <= today && endDate >= today) return 'Em Andamento';
            return 'Agendado';
        };

        function App() {
          // General App States
          const [view, setView] = useState('dashboard');
          const [isAdmin, setIsAdmin] = useState(false);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [lastUpdated, setLastUpdated] = useState(() => localStorage.getItem('sigum_lastUpdated_v2') || null);
          
          // Data States
          const [atendimentos, setAtendimentos] = useState(() => {
            try {
              const savedData = localStorage.getItem('sigum_atendimentos_v2');
              if (savedData) {
                  let parsed = JSON.parse(savedData);
                  return parsed.map(a => {
                      let cleanedUM = a.um || '';
                      cleanedUM = cleanedUM.replace(/^U\.M\.\s-\s/, '').replace(/^U\.M\.\s/, '');
                      return {...a, um: cleanedUM, status: evaluateStatus(a.inicio, a.fim, a.statusOverride || a.status)};
                  });
              }
              return INITIAL_DATA;
            } catch (e) {
              return INITIAL_DATA;
            }
          });

          // Modal States
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [editingItem, setEditingItem] = useState(null);
          const [deleteConfirmId, setDeleteConfirmId] = useState(null);
          const [formData, setFormData] = useState({
            um: '', area: '', escola: '', municipio: '', inicio: '', fim: '', status: 'Agendado', matriculas: 0, cargaHoraria: 0, receita: 0, impactoSocial: false, statusOverride: ''
          });

          // Dashboard Filters
          const [dashAno, setDashAno] = useState('');
          const [dashEscola, setDashEscola] = useState('');
          const [dashUM, setDashUM] = useState('');

          // Reservas Filters
          const [searchTerm, setSearchTerm] = useState('');
          const [resFilterUM, setResFilterUM] = useState('');
          const [resFilterEscola, setResFilterEscola] = useState('');
          const [resFilterInicio, setResFilterInicio] = useState('');
          const [resFilterFim, setResFilterFim] = useState('');
          const [resFilterStatus, setResFilterStatus] = useState('');

          // Gantt Filters
          const [ganttFilterUM, setGanttFilterUM] = useState('');
          const [ganttFilterStatus, setGanttFilterStatus] = useState('');
          const [ganttStartDate, setGanttStartDate] = useState('2026-06-01');

          // Frota Filters
          const [frotaFilterCod, setFrotaFilterCod] = useState('');
          const [frotaFilterOrigem, setFrotaFilterOrigem] = useState('');
          const [frotaFilterStatus, setFrotaFilterStatus] = useState('');
          const [frotaFilterCat, setFrotaFilterCat] = useState('');

          // Simulacao States
          const [simUM, setSimUM] = useState('');
          const [simHoras, setSimHoras] = useState(160);
          const [simBase, setSimBase] = useState(400);
          const [simAdicional, setSimAdicional] = useState(0);

          useEffect(() => {
            try {
              localStorage.setItem('sigum_atendimentos_v2', JSON.stringify(atendimentos));
            } catch (e) {}
          }, [atendimentos]);

          useEffect(() => {
            if (lastUpdated) localStorage.setItem('sigum_lastUpdated_v2', lastUpdated);
          }, [lastUpdated]);

          const recordUpdate = () => setLastUpdated(new Date().toLocaleString('pt-BR'));

          // Common Tooltip used across all charts
          const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
              const data = payload[0].payload;
              return (
                <div className="bg-white p-4 border border-slate-200 shadow-xl rounded-xl text-sm min-w-[220px] z-50">
                  <p className="font-bold text-slate-800 mb-3 border-b border-slate-100 pb-2">{data.fullName || label || data.name}</p>
                  <div className="space-y-2">
                    {data.Atendimentos !== undefined && <p className="flex justify-between items-center text-slate-600"><span className="font-medium text-slate-800 mr-4">Atendimentos:</span> <span>{data.Atendimentos || data.value}</span></p>}
                    <p className="flex justify-between items-center text-slate-600"><span className="font-medium text-slate-800 mr-4">Matrículas:</span> <span>{data.matriculas?.toLocaleString('pt-BR') || 0}</span></p>
                    <p className="flex justify-between items-center text-slate-600"><span className="font-medium text-slate-800 mr-4">Carga Horária:</span> <span>{data.cargaHoraria ? `${data.cargaHoraria.toLocaleString('pt-BR')}h` : '0h'}</span></p>
                    <p className="flex justify-between items-center text-slate-600"><span className="font-medium text-slate-800 mr-4">Receita Prevista:</span> <span className="font-semibold text-emerald-600">{formatCurrency(data.receita || 0)}</span></p>
                  </div>
                </div>
              );
            }
            return null;
          };

          // Available years for Dashboard filter
          const dashAnosDisponiveis = useMemo(() => {
            const anos = new Set();
            atendimentos.forEach(a => {
                if (a.inicio) anos.add(a.inicio.substring(0,4));
                if (a.fim) anos.add(a.fim.substring(0,4));
            });
            return Array.from(anos).sort().reverse();
          }, [atendimentos]);

          const renderDashboard = () => {
            // Apply Dashboard Filters
            const filteredDashAtendimentos = atendimentos.filter(a => {
                const matchAno = dashAno === '' || (a.inicio && a.inicio.startsWith(dashAno)) || (a.fim && a.fim.startsWith(dashAno));
                const matchEscola = dashEscola === '' || a.escola === dashEscola;
                const matchUM = dashUM === '' || a.um === dashUM;
                return matchAno && matchEscola && matchUM;
            });

            // Calculate active unique UMs based on filtered set
            const activeUMs = new Set(filteredDashAtendimentos.filter(a => a.status === 'Em Andamento').map(a => a.um)).size;

            const dashKpis = filteredDashAtendimentos.reduce((acc, curr) => {
                if (curr.status !== 'Manutenção' && curr.status !== 'Cancelado') {
                    acc.matriculas += Number(curr.matriculas) || 0;
                    acc.cargaHoraria += Number(curr.cargaHoraria) || 0;
                    acc.receita += Number(curr.receita) || 0;
                }
                return acc;
            }, { matriculas: 0, cargaHoraria: 0, receita: 0 });

            // Chart Data Builders
            const getChartDataArea = () => {
                const data = {};
                filteredDashAtendimentos.forEach(a => {
                    if (!data[a.area]) data[a.area] = { name: a.area, Atendimentos: 0, matriculas: 0, receita: 0, cargaHoraria: 0 };
                    data[a.area].Atendimentos++;
                    data[a.area].matriculas += Number(a.matriculas) || 0;
                    data[a.area].receita += Number(a.receita) || 0;
                    data[a.area].cargaHoraria += Number(a.cargaHoraria) || 0;
                });
                return Object.values(data).sort((a, b) => b.Atendimentos - a.Atendimentos);
            };

            const getChartDataStatus = () => {
                const data = {};
                filteredDashAtendimentos.forEach(a => {
                    if (!data[a.status]) data[a.status] = { name: a.status, value: 0, matriculas: 0, receita: 0, cargaHoraria: 0, color: STATUS_COLORS[a.status] };
                    data[a.status].value++;
                    data[a.status].matriculas += Number(a.matriculas) || 0;
                    data[a.status].receita += Number(a.receita) || 0;
                    data[a.status].cargaHoraria += Number(a.cargaHoraria) || 0;
                });
                return Object.values(data);
            };

            const getChartDataUM = () => {
                const data = {};
                filteredDashAtendimentos.forEach(a => {
                    const shortName = a.um;
                    if (!data[shortName]) data[shortName] = { name: shortName, fullName: a.um, matriculas: 0, receita: 0, Atendimentos: 0, cargaHoraria: 0 };
                    data[shortName].Atendimentos++;
                    data[shortName].matriculas += Number(a.matriculas) || 0;
                    data[shortName].receita += Number(a.receita) || 0;
                    data[shortName].cargaHoraria += Number(a.cargaHoraria) || 0;
                });
                return Object.values(data).sort((a,b) => a.name.localeCompare(b.name));
            };

            const getChartDataCliente = () => {
                const data = {};
                filteredDashAtendimentos.forEach(a => {
                    const client = a.escola;
                    if (!data[client]) data[client] = { name: client, fullName: client, matriculas: 0, receita: 0, Atendimentos: 0, cargaHoraria: 0 };
                    data[client].Atendimentos++;
                    data[client].matriculas += Number(a.matriculas) || 0;
                    data[client].receita += Number(a.receita) || 0;
                    data[client].cargaHoraria += Number(a.cargaHoraria) || 0;
                });
                // Ordenar por receita decrescente
                return Object.values(data).sort((a,b) => b.receita - a.receita);
            };

            const chartDataArea = getChartDataArea();
            const chartDataStatus = getChartDataStatus();
            const chartDataUM = getChartDataUM();
            const chartDataCliente = getChartDataCliente();

            return (
              <div className="space-y-6 animate-in fade-in duration-500">
                {/* Painel de Filtros do Dashboard */}
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row gap-4 items-center justify-between">
                  <div className="flex items-center text-slate-700 font-semibold w-full md:w-auto">
                      <i className="fa-solid fa-filter mr-2 text-blue-600"></i> Filtros do Painel
                  </div>
                  <div className="flex flex-wrap md:flex-nowrap items-center gap-3 w-full md:w-auto">
                      <select className="flex-1 min-w-[140px] p-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" value={dashAno} onChange={e => setDashAno(e.target.value)}>
                          <option value="">Todos os Anos</option>
                          {dashAnosDisponiveis.map(ano => <option key={ano} value={ano}>{ano}</option>)}
                      </select>
                      <select className="flex-1 min-w-[140px] p-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" value={dashEscola} onChange={e => setDashEscola(e.target.value)}>
                          <option value="">Todos os Clientes</option>
                          {ESCOLAS_SENAI.map(esc => <option key={esc} value={esc}>{esc}</option>)}
                      </select>
                      <select className="flex-1 min-w-[140px] p-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500" value={dashUM} onChange={e => setDashUM(e.target.value)}>
                          <option value="">Todas as Unidades</option>
                          {FROTA_DATA.map(u => <option key={u.cod} value={u.cod}>{u.cod}</option>)}
                      </select>
                  </div>
                </div>

                {/* KPIs */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center space-x-4">
                    <div className="p-3 bg-blue-100 text-blue-700 rounded-lg"><i className="fa-solid fa-truck text-2xl"></i></div>
                    <div>
                      <p className="text-sm text-slate-500 font-medium">U.Ms em Operação</p>
                      <p className="text-2xl font-bold text-slate-800">{activeUMs} <span className="text-sm font-normal text-slate-400">/ {FROTA_DATA.length}</span></p>
                    </div>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center space-x-4">
                    <div className="p-3 bg-emerald-100 text-emerald-700 rounded-lg"><i className="fa-solid fa-users text-2xl"></i></div>
                    <div>
                      <p className="text-sm text-slate-500 font-medium">Total Matrículas</p>
                      <p className="text-2xl font-bold text-slate-800">{dashKpis.matriculas.toLocaleString('pt-BR')}</p>
                    </div>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center space-x-4">
                    <div className="p-3 bg-amber-100 text-amber-700 rounded-lg"><i className="fa-solid fa-clock text-2xl"></i></div>
                    <div>
                      <p className="text-sm text-slate-500 font-medium">Carga Horária (h)</p>
                      <p className="text-2xl font-bold text-slate-800">{dashKpis.cargaHoraria.toLocaleString('pt-BR')}</p>
                    </div>
                  </div>
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center space-x-4">
                    <div className="p-3 bg-indigo-100 text-indigo-700 rounded-lg"><i className="fa-solid fa-dollar-sign text-2xl px-1"></i></div>
                    <div>
                      <p className="text-sm text-slate-500 font-medium">Receita Estimada</p>
                      <p className="text-2xl font-bold text-slate-800">{formatCurrency(dashKpis.receita)}</p>
                    </div>
                  </div>
                </div>

                {/* Graficos (2 colunas) */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  {/* Gráfico 1 */}
                  <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col">
                    <h3 className="text-lg font-semibold text-slate-800 mb-1 flex items-center"><i className="fa-solid fa-file-contract mr-2 text-slate-500"></i> Valor dos Contratos por U.M.</h3>
                    <p className="text-xs text-slate-500 mb-4">Receita estimada gerada por cada unidade móvel.</p>
                    <div className="flex-1 w-full min-h-[300px]">
                      <ResponsiveContainer width="100%" height="100%">
                        <BarChart data={chartDataUM} margin={{ top: 20, right: 10, left: 0, bottom: 0 }}>
                          <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                          <XAxis dataKey="name" tick={{fontSize: 11}} interval={0} angle={-35} textAnchor="end" height={60} />
                          <YAxis tick={{fontSize: 12}} tickFormatter={(value) => `R$ ${value/1000}k`} />
                          <RechartsTooltip content={<CustomTooltip />} cursor={{fill: '#f1f5f9'}} />
                          <Bar dataKey="receita" fill="#0284c7" radius={[4, 4, 0, 0]}>
                            <LabelList dataKey="receita" position="top" formatter={(val) => `R$ ${(val/1000).toLocaleString('pt-BR', {maximumFractionDigits: 1})}k`} fill="#475569" fontSize={11} fontWeight={600} />
                          </Bar>
                        </BarChart>
                      </ResponsiveContainer>
                    </div>
                  </div>

                  {/* Gráfico 2 */}
                  <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col">
                    <h3 className="text-lg font-semibold text-slate-800 mb-1 flex items-center"><i className="fa-solid fa-chart-pie mr-2 text-slate-500"></i> Status da Frota</h3>
                    <p className="text-xs text-slate-500 mb-4">Detalhamento de volume e valores retidos em cada status.</p>
                    <div className="flex-1 w-full min-h-[300px] flex items-center justify-center">
                      <ResponsiveContainer width="100%" height="100%">
                        <PieChart margin={{ top: 0, right: 0, left: 0, bottom: 0 }}>
                          <Pie
                            data={chartDataStatus}
                            cx="50%"
                            cy="50%"
                            innerRadius={65}
                            outerRadius={95}
                            paddingAngle={5}

          const renderGantt = () => {
            const filteredUMs = ganttFilterUM ? FROTA_DATA.filter(u => u.cod === ganttFilterUM) : FROTA_DATA;
            const filteredGanttAtendimentos = atendimentos.filter(a => {
              if (ganttFilterStatus && a.status !== ganttFilterStatus) return false;
              return true;
            });

            // Gerando horizonte de 6 meses
            const timelineStart = new Date(`${ganttStartDate}T00:00:00`); 
            const months = [];
            for(let i=0; i<6; i++) {
              let d = new Date(timelineStart.getFullYear(), timelineStart.getMonth() + i, 1);
              months.push({ name: d.toLocaleString('pt-BR', { month: 'short' }).toUpperCase(), year: d.getFullYear(), days: new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate() });
            }
            
            const totalDaysTimeline = months.reduce((acc, m) => acc + m.days, 0);
            const todayReal = new Date();
            const timeDiffToToday = todayReal.getTime() - timelineStart.getTime();
            const daysExactToToday = timeDiffToToday / (1000 * 60 * 60 * 24);
            const todayLeftPercent = (daysExactToToday / totalDaysTimeline) * 100;
            const isTodayInView = todayLeftPercent >= 0 && todayLeftPercent <= 100;

            return (
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[600px] animate-in fade-in duration-500 relative">
                <div className="p-4 border-b border-slate-200 bg-slate-50 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                  <div>
                    <h3 className="font-semibold text-slate-800 flex items-center"><i className="fa-solid fa-list-check mr-2 text-blue-600"></i> Mapa de Ocupação (Gantt)</h3>
                  </div>
                  <div className="flex flex-wrap items-center gap-3">
                    <select className="p-2 bg-white border border-slate-300 rounded-lg text-xs font-medium text-slate-700" value={ganttFilterUM} onChange={e => setGanttFilterUM(e.target.value)}>
                        <option value="">Todas as Unidades</option>
                        {FROTA_DATA.map(u => <option key={u.cod} value={u.cod}>{u.cod}</option>)}
                    </select>
                    <select className="p-2 bg-white border border-slate-300 rounded-lg text-xs font-medium text-slate-700" value={ganttFilterStatus} onChange={e => setGanttFilterStatus(e.target.value)}>
                        <option value="">Todos os Status</option>
                        {Object.keys(STATUS_COLORS).map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                    <select className="p-2 bg-white border border-slate-300 rounded-lg text-xs font-medium text-slate-700" value={ganttStartDate} onChange={e => setGanttStartDate(e.target.value)}>
                        {MESES_OPCOES.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                    </select>
                  </div>
                </div>

                <div className="flex-1 overflow-auto flex">
                  <div className="w-48 sm:w-64 border-r border-slate-200 flex-shrink-0 bg-white sticky left-0 z-30 shadow-[2px_0_5px_rgba(0,0,0,0.05)]">
                    <div className="h-12 border-b border-slate-200 bg-slate-50"></div>
                    {filteredUMs.map((um) => (
                      <div key={um.cod} className="h-16 flex flex-col justify-center px-4 border-b border-slate-100">
                        <span className="text-sm font-medium text-slate-800 truncate" title={um.cod}>{um.cod}</span>
                      </div>
                    ))}
                  </div>

                  <div className="flex-1 min-w-[900px] relative">
                    {isTodayInView && (
                      <div className="absolute top-0 bottom-0 border-l-2 border-[#ED1C24] border-dashed z-20 pointer-events-none flex flex-col items-center" style={{ left: `${todayLeftPercent}%` }}>
                        <div className="bg-[#ED1C24] text-white text-[10px] px-2 py-0.5 rounded-b font-bold shadow-sm whitespace-nowrap -translate-x-1/2 mt-0">Hoje</div>
                      </div>
                    )}

                    <div className="h-12 border-b border-slate-200 bg-slate-50 flex relative z-10">
                      {months.map((m, i) => (
                        <div key={i} className="border-r border-slate-200 flex items-center justify-center text-xs font-semibold text-slate-500" style={{ width: `${(m.days / totalDaysTimeline) * 100}%`}}>
                          {m.name} {m.year}
                        </div>
                      ))}
                    </div>

                    <div className="relative" style={{ height: `${Math.max(filteredUMs.length * 4, 1)}rem` }}>
                      {months.map((m, i) => {
                        const prevDays = months.slice(0, i).reduce((acc, curr) => acc + curr.days, 0);
                        return <div key={i} className="absolute top-0 bottom-0 border-l border-slate-100 z-0" style={{ left: `${(prevDays / totalDaysTimeline) * 100}%` }}></div>;
                      })}

                      {filteredUMs.map((um, rowIndex) => {
                        const umAtendimentos = filteredGanttAtendimentos.filter(a => a.um === um.cod);
                        return (
                          <div key={rowIndex} className="h-16 border-b border-slate-100 relative group hover:bg-slate-50/50 z-10">
                            {umAtendimentos.map(atend => {
                              const start = new Date(`${atend.inicio}T00:00:00`);
                              const end = new Date(`${atend.fim}T00:00:00`);
                              if (end.getTime() < timelineStart.getTime()) return null;

                              const visualStart = start.getTime() < timelineStart.getTime() ? timelineStart : start;
                              const daysFromStart = getDaysBetween(timelineStart, visualStart);
                              const duration = getDaysBetween(visualStart, end);
                              
                              const leftPercent = (daysFromStart / totalDaysTimeline) * 100;
                              const widthPercent = (duration / totalDaysTimeline) * 100;

                              return (
                                <div 
                                  key={atend.id}
                                  className="absolute top-3 h-10 rounded-md shadow-sm flex items-center px-2 text-white text-xs truncate cursor-pointer transition-transform hover:-translate-y-0.5 hover:shadow-md overflow-hidden"
                                  style={{ left: `${Math.max(0, leftPercent)}%`, width: `${widthPercent}%`, backgroundColor: STATUS_COLORS[atend.status] }}
                                  title={`Cliente: ${atend.escola}\nPeríodo: ${formatDate(atend.inicio)} a ${formatDate(atend.fim)}\nStatus: ${atend.status}`}
                                  onClick={() => window.dispatchEvent(new CustomEvent('openModalCadastro', { detail: { item: atend } }))}
                                >
                                  <span className="truncate w-full drop-shadow-sm font-medium pl-1">{atend.escola}</span>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  </div>

            );
          };

                                <option value="OPERACIONAL">OPERACIONAL</option>
                                <option value="REFORMA">REFORMA</option>
                                <option value="MANUTENÇÃO">MANUTENÇÃO</option>
                            </select>
                        </th>
                        <th className="p-2"><input type="text" placeholder="Filtrar Placa/Cat..." className="w-full p-1.5 text-xs border border-slate-300 rounded font-normal text-slate-700" value={frotaFilterCat} onChange={e => setFrotaFilterCat(e.target.value)} /></th>
                        <th className="p-2 text-xs text-center text-slate-400 font-normal italic">Sem filtro</th>
                        <th className="p-2 text-xs text-center text-slate-400 font-normal italic">Sem filtro</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-200">
                      {filteredFrotaLocal.map((frota, idx) => (
                        <tr key={idx} className="hover:bg-slate-50/50 transition-colors">
                          <td className="p-3 font-bold text-[#005CAA] whitespace-nowrap">{frota.cod}</td>
                          <td className="p-3">

            const simulacao = (() => {
              const umObj = FROTA_DATA.find(u => u.cod === simUM);
              const subtotal = Number(simHoras) * Number(simBase);
              const total = subtotal + Number(simAdicional);
              return { umObj, subtotal, total };
            })();

            const agendarSimulacao = () => {
              window.dispatchEvent(new CustomEvent('openModalCadastro', { 
                  detail: { 
                      prefill: {
                        um: simulacao.umObj ? simulacao.umObj.cod : '',

                        <option value="">Selecione uma Unidade da Frota...</option>
                        {FROTA_DATA.map(u => <option key={u.cod} value={u.cod}>{u.cod} ({u.categoria})</option>)}
                      </select>
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Carga Horária Locada (h)</label>
                      <input type="number" min="1" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" value={simHoras} onChange={e => setSimHoras(e.target.value)} />
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Valor da Hora (R$ / h)</label>
                      <input type="number" step="0.01" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" value={simBase} onChange={e => setSimBase(e.target.value)} />
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Custos Logísticos/Adicionais (R$)</label>
                      <input type="number" step="0.01" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" value={simAdicional} onChange={e => setSimAdicional(e.target.value)} />
                    </div>
                  </div>
                </div>

                <div className="bg-[#002f5c] rounded-xl shadow-lg border border-[#001529] p-6 text-white flex flex-col relative overflow-hidden">
                  <div className="absolute top-0 right-0 p-4 opacity-10"><i className="fa-solid fa-file-invoice-dollar text-9xl"></i></div>
                  <h3 className="text-lg font-bold text-blue-200 mb-4 border-b border-white/10 pb-2 relative z-10">Resumo da Cotação</h3>
                  
                  <div className="flex-1 space-y-4 relative z-10">
                    <div className="flex justify-between items-center text-sm border-b border-white/10 pb-4">
                      <span className="text-blue-100">Cálculo Base (Hora x CH):</span>
                      <span className="font-medium">{formatCurrency(simulacao.subtotal)}</span>
                    </div>
                    <div className="flex justify-between items-center text-sm border-b border-white/10 pb-4">
                      <span className="text-blue-100">Logística/Deslocamento:</span>
                      <span className="font-medium text-emerald-300">+{formatCurrency(simAdicional)}</span>
                    </div>
                    <div className="pt-2">
                      <p className="text-xs text-blue-300 uppercase tracking-wider mb-1">Preço Final Estimado</p>
                      <p className="text-3xl font-black text-white">{formatCurrency(simulacao.total)}</p>
                    </div>
                  </div>

                  <button onClick={agendarSimulacao} className="w-full mt-6 bg-[#ED1C24] hover:bg-red-700 text-white font-bold py-3 rounded-lg shadow-md transition-colors flex justify-center items-center relative z-10">
                    <i className="fa-solid fa-calendar-check mr-2"></i> Converter em Reserva
                  </button>
                </div>
              </div>
            );
          };

          const handleSaveForm = (e) => {
              e.preventDefault();
              const umData = FROTA_DATA.find(u => u.cod === formData.um);
              const area = umData ? umData.area : 'Indefinida';
              const finalStatus = evaluateStatus(formData.inicio, formData.fim, formData.statusOverride);
              const finalData = { ...formData, area: area, status: finalStatus };

              setAtendimentos(prev => {
                if (editingItem) return prev.map(a => a.id === editingItem ? { ...finalData, id: editingItem } : a);
                return [...prev, { ...finalData, id: Date.now() }];
              });
              recordUpdate();
              setIsModalOpen(false);
          };

          const executeDelete = () => {
            setAtendimentos(prev => prev.filter(a => a.id !== deleteConfirmId));
            setDeleteConfirmId(null);
            recordUpdate();
          };

          const autoStatusPreview = evaluateStatus(formData.inicio, formData.fim, formData.statusOverride);

          // Component Modal Interno
          const ModalCadastro = () => {
              useEffect(() => {
                  const handleOpen = (e) => {
                      if (e.detail && e.detail.item) {
                          setEditingItem(e.detail.item.id);
                          setFormData({ ...e.detail.item, statusOverride: e.detail.item.status === 'Manutenção' ? 'Manutenção' : '' });
                      } else if (e.detail && e.detail.prefill) {
                          setEditingItem(null);
                          setFormData({ ...e.detail.prefill, statusOverride: '' });
                      } else {
                          setEditingItem(null);
                          setFormData({ um: '', escola: '', municipio: '', inicio: '', fim: '', matriculas: 0, cargaHoraria: 0, receita: 0, impactoSocial: false, statusOverride: '' });
                      }
                      setIsModalOpen(true);
                  };
                  window.addEventListener('openModalCadastro', handleOpen);
                  return () => window.removeEventListener('openModalCadastro', handleOpen);
              }, []);

              if (!isModalOpen) return null;

              return (
                  <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-2xl shadow-xl w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh]">
                    <div className="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                      <h2 className="text-xl font-bold text-slate-800 flex items-center">
                        {editingItem ? <i className="fa-solid fa-pen mr-2 text-blue-600"></i> : <i className="fa-solid fa-plus mr-2 text-[#ED1C24]"></i>}
                        {editingItem ? 'Editar Atendimento' : 'Nova Solicitação de U.Móvel'}
                      </h2>
                      <button type="button" onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-200 transition">
                        <i className="fa-solid fa-xmark text-xl"></i>
                      </button>
                    </div>
                    
                    <div className="p-6 overflow-y-auto flex-1">
                      <form id="reserva-form" onSubmit={handleSaveForm} className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div className="col-span-1 sm:col-span-2">
                          <label className="block text-sm font-medium text-slate-700 mb-1">Escola Solicitante / Cliente</label>
                          <select required className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white"
                            value={formData.escola} onChange={e => setFormData({...formData, escola: e.target.value})}>
                            <option value="">Selecione a Escola...</option>
                            {ESCOLAS_SENAI.map(esc => <option key={esc} value={esc}>{esc}</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Unidade Móvel Requerida</label>
                          <select required className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                            value={formData.um} onChange={e => setFormData({...formData, um: e.target.value})}>
                            <option value="">Selecione...</option>
                            {FROTA_DATA.map(u => <option key={u.cod} value={u.cod}>{u.cod}</option>)}
                          </select>
                          <p className="text-xs text-slate-500 mt-1">Área tecnológica vinculada automaticamente.</p>
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Município de Destino</label>
                          <input required type="text" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                            value={formData.municipio} onChange={e => setFormData({...formData, municipio: e.target.value})} placeholder="Digite a cidade" />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Data de Início</label>
                          <input required type="date" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                            value={formData.inicio} onChange={e => setFormData({...formData, inicio: e.target.value})} />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Data de Término</label>
                          <input required type="date" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                            value={formData.fim} onChange={e => setFormData({...formData, fim: e.target.value})} />
                        </div>

                        <div className="col-span-1 sm:col-span-2 bg-slate-50 p-3 rounded-lg border border-slate-200">
                            <p className="text-sm font-medium text-slate-700">Status Gerado pelo Sistema:</p>
                            <p className="text-lg font-bold" style={{color: STATUS_COLORS[autoStatusPreview]}}>{autoStatusPreview}</p>
                            <p className="text-xs text-slate-500">Calculado com base na data de hoje ({new Date().toLocaleDateString('pt-BR')}) vs. período selecionado.</p>
                        </div>

                        <div className="col-span-1 sm:col-span-2 pt-4 border-t border-slate-200 mt-2">
                          <h4 className="text-sm font-semibold text-slate-800 mb-4">Indicadores de Desempenho</h4>
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Previsão de Matrículas</label>
                          <input type="number" min="0" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                            value={formData.matriculas} onChange={e => setFormData({...formData, matriculas: e.target.value})} />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Carga Horária Total (h)</label>
                          <input type="number" min="0" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                            value={formData.cargaHoraria} onChange={e => setFormData({...formData, cargaHoraria: e.target.value})} />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Receita Estimada (R$)</label>
                          <input type="number" min="0" step="0.01" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                            value={formData.receita} onChange={e => setFormData({...formData, receita: e.target.value})} />
                        </div>

                        {isAdmin && (
                            <div className="col-span-1 sm:col-span-2 pt-4 border-t border-slate-200 mt-2 bg-amber-50 p-4 rounded-xl border border-amber-200">
                              <h4 className="text-sm font-bold text-amber-800 mb-3"><i className="fa-solid fa-lock mr-2"></i> Controles Exclusivos CMOV</h4>
                              <div className="flex flex-col sm:flex-row gap-4">
                                  <div className="flex-1">
                                      <label className="block text-xs font-medium text-amber-900 mb-1">Sobrescrever Status</label>
                                      <select className="w-full p-2 border border-amber-300 rounded-lg bg-white text-sm"
                                      value={formData.statusOverride} onChange={e => setFormData({...formData, statusOverride: e.target.value})}>
                                      <option value="">Automático</option>
                                      <option value="Manutenção">Forçar: Manutenção / Indisponível</option>
                                      </select>
                                  </div>
                                  <div className="flex items-center flex-1 mt-4 sm:mt-0">
                                      <label className="flex items-center cursor-pointer">
                                      <input type="checkbox" className="sr-only peer" checked={formData.impactoSocial} onChange={e => setFormData({...formData, impactoSocial: e.target.checked})} />
                                      <div className="w-11 h-6 bg-slate-300 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-amber-500 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-amber-600"></div>
                                      <span className="ml-3 text-sm font-medium text-amber-900">Ação de Impacto Social / Gratuita</span>
                                      </label>
                                  </div>
                              </div>
                            </div>
                        )}
                      </form>
                    </div>
                    
                    <div className="p-5 border-t border-slate-200 bg-slate-50 flex justify-end space-x-3">
                      <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2.5 border border-slate-300 rounded-lg text-sm font-medium text-slate-700 bg-white hover:bg-slate-100 transition-colors">
                        Cancelar
                      </button>
                      <button type="submit" form="reserva-form" className="px-5 py-2.5 bg-[#005CAA] text-white rounded-lg text-sm font-medium hover:bg-blue-800 transition-colors shadow-sm flex items-center">
                        <i className="fa-solid fa-check mr-2"></i> Salvar {editingItem ? 'Alterações' : 'Reserva'}
                      </button>
                    </div>
                  </div>
                </div>
              );
          };

          return (
            <div className="min-h-screen flex font-sans text-slate-900">
              <aside className="hidden md:flex flex-col w-64 bg-[#002f5c] text-white shadow-xl z-20">
                <div className="p-4 border-b border-white/10 flex items-center justify-center bg-white">
                  <img src="https://i.postimg.cc/0Nh7xNQL/LOGO-UNIDADES-MOVEIS-SESI-2025.png" alt="Logo SESI SENAI Unidades Móveis" className="w-full h-auto max-h-16 object-contain" />
                </div>
                <nav className="flex-1 p-4 space-y-2">
                  <button onClick={() => setView('dashboard')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'dashboard' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-chart-line text-lg mr-3 w-5"></i> Dashboard CMOV
                  </button>
                  <button onClick={() => setView('reservas')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'reservas' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-calendar-days text-lg mr-3 w-5"></i> Calendário / Reservas
                  </button>
                  <button onClick={() => setView('gantt')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'gantt' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-truck text-lg mr-3 w-5"></i> Monitoramento Frota
                  </button>
                  <button onClick={() => setView('frota')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'frota' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-truck-fast text-lg mr-3 w-5"></i> Quadro da Frota
                  </button>
                  <button onClick={() => setView('simulacao')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'simulacao' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-calculator text-lg mr-3 w-5"></i> Simulador Contrato
                  </button>
                </nav>
              </aside>

              <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                <header className="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-4 sm:px-6 z-10 shrink-0 shadow-sm">
                  <div className="flex items-center">
                    <button className="md:hidden p-2 -ml-2 text-slate-500 hover:bg-slate-100 rounded-lg mr-2" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                      <i className="fa-solid fa-bars text-xl"></i>
                    </button>
                    <h2 className="text-lg font-bold text-[#002f5c] hidden sm:block">SIGUM - Sistema de Gestão de Unidades Móveis</h2>
                  </div>

                  <div className="flex items-center space-x-4">
                     <label className="hidden md:flex items-center cursor-pointer px-3 py-1 bg-slate-100 rounded-full border border-slate-200">
                        <span className="text-xs font-semibold text-slate-600 mr-2">Acesso CMOV</span>
                        <input type="checkbox" className="sr-only peer" checked={isAdmin} onChange={e => setIsAdmin(e.target.checked)} />
                        <div className="w-8 h-4 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-[#005CAA] relative"></div>
                     </label>
                    <div className="w-8 h-8 rounded-full bg-[#005CAA] text-white flex items-center justify-center font-bold text-sm shadow-inner">
                      {isAdmin ? 'AD' : 'ES'}
                    </div>
                  </div>
                </header>

                {isMobileMenuOpen && (
                  <div className="absolute top-16 left-0 right-0 bg-[#002f5c] text-white shadow-xl z-20 md:hidden animate-in slide-in-from-top-2 border-b border-[#001529]">
                    <nav className="flex flex-col p-2 space-y-1">
                      <button onClick={() => {setView('dashboard'); setIsMobileMenuOpen(false)}} className={`p-3 text-left rounded-lg text-sm font-medium ${view === 'dashboard' ? 'bg-[#005CAA]' : ''}`}><i className="fa-solid fa-chart-line mr-2"></i> Dashboard</button>
                      <button onClick={() => {setView('reservas'); setIsMobileMenuOpen(false)}} className={`p-3 text-left rounded-lg text-sm font-medium ${view === 'reservas' ? 'bg-[#005CAA]' : ''}`}><i className="fa-solid fa-calendar-days mr-2"></i> Reservas</button>
                      <button onClick={() => {setView('gantt'); setIsMobileMenuOpen(false)}} className={`p-3 text-left rounded-lg text-sm font-medium ${view === 'gantt' ? 'bg-[#005CAA]' : ''}`}><i className="fa-solid fa-truck mr-2"></i> Gantt Frota</button>
                      <button onClick={() => {setView('frota'); setIsMobileMenuOpen(false)}} className={`p-3 text-left rounded-lg text-sm font-medium ${view === 'frota' ? 'bg-[#005CAA]' : ''}`}><i className="fa-solid fa-truck-fast mr-2"></i> Quadro da Frota</button>
                      <button onClick={() => {setView('simulacao'); setIsMobileMenuOpen(false)}} className={`p-3 text-left rounded-lg text-sm font-medium ${view === 'simulacao' ? 'bg-[#005CAA]' : ''}`}><i className="fa-solid fa-calculator mr-2"></i> Simulador Contrato</button>
                      <div className="mt-2 pt-2 border-t border-white/10 px-2 flex items-center justify-between">
                          <span className="text-xs text-blue-200">Modo CMOV</span>
                          <input type="checkbox" checked={isAdmin} onChange={e => setIsAdmin(e.target.checked)} className="rounded" />
                      </div>
                    </nav>
                  </div>
                )}

                <div className="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-50/50">
                  <div className="mb-6">
                      <h2 className="text-2xl font-bold text-slate-800">
                        {view === 'dashboard' && 'Visão Geral CMOV'}
                        {view === 'reservas' && 'Gestão de Reservas U.M'}
                        {view === 'gantt' && 'Monitoramento e Cronograma'}
                        {view === 'frota' && 'Status Operacional da Frota'}
                        {view === 'simulacao' && 'Simulador de Contratos'}
                      </h2>
                      <p className="text-slate-500 text-sm mt-1">Acompanhe e gerencie a frota de unidades móveis do SENAI Goiás.</p>
                      {lastUpdated && <div className="mt-2 inline-block px-2 py-1 bg-blue-50 text-blue-700 text-xs rounded border border-blue-100"><i className="fa-solid fa-cloud-arrow-down mr-1"></i> Dados locais atualizados em: {lastUpdated}</div>}
                  </div>

                  {view === 'dashboard' && renderDashboard()}
                  {view === 'reservas' && renderReservas()}
                  {view === 'gantt' && renderGantt()}
                  {view === 'frota' && renderFrota()}
                  {view === 'simulacao' && renderSimulacao()}
                </div>
              </main>
              
              <ModalCadastro />
              
              {deleteConfirmId && (
              <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-sm p-6 text-center">
                  <i className="fa-solid fa-triangle-exclamation text-4xl text-red-500 mb-4"></i>
                  <h3 className="text-lg font-bold text-slate-800 mb-2">Confirmar Exclusão</h3>
                  <p className="text-sm text-slate-500 mb-6">Tem certeza que deseja excluir este atendimento?</p>
                  <div className="flex justify-center space-x-3">
                    <button onClick={() => setDeleteConfirmId(null)} className="px-4 py-2 border border-slate-300 rounded-lg text-sm font-medium text-slate-700 bg-white hover:bg-slate-50">Cancelar</button>
                    <button onClick={executeDelete} className="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 shadow-sm">Sim, Excluir</button>
                  </div>
                </div>
              </div>
              )}
            </div>
          );
        }

        const root = window.ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
