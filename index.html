<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGUM - Gestão U.Móveis SENAI</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (UMD - Navegador) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel para compilação do JSX em tempo real no navegador -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <!-- Dependências essenciais do Recharts para evitar o erro 'ForwardRef' -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>

    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js" crossorigin></script>
</head>
<body class="bg-slate-100 overflow-hidden text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-presets="env" data-plugins="transform-react-jsx">
        // ATENÇÃO: Sem uso de importações externas. Acessamos o React e Recharts globalmente.
        const { useState, useMemo, useEffect, useRef } = window.React;
        const { 
          BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, ResponsiveContainer,
          PieChart, Pie, Cell, LabelList
        } = window.Recharts;

        // Dados Iniciais Simulados
        const INITIAL_DATA = [
          { id: 1, um: 'UM-01 Confecção', area: 'Vestuário', escola: 'FATEC SENAI Ítalo Bologna', municipio: 'Goiânia', inicio: '2026-06-10', fim: '2026-07-20', status: 'Em Andamento', matriculas: 120, cargaHoraria: 160, receita: 45000, impactoSocial: true },
          { id: 2, um: 'UM-02 Solda', area: 'Metalmecânica', escola: 'SENAI Vila Canaã', municipio: 'Aparecida de Goiânia', inicio: '2026-06-01', fim: '2026-06-30', status: 'Em Andamento', matriculas: 80, cargaHoraria: 200, receita: 60000, impactoSocial: false },
          { id: 3, um: 'UM-03 Informática', area: 'TI', escola: 'SENAI Anápolis', municipio: 'Anápolis', inicio: '2026-07-05', fim: '2026-08-15', status: 'Agendado', matriculas: 150, cargaHoraria: 80, receita: 30000, impactoSocial: true },
          { id: 4, um: 'UM-04 Panificação', area: 'Alimentos', escola: 'SENAI Rio Verde', municipio: 'Rio Verde', inicio: '2026-05-15', fim: '2026-06-15', status: 'Concluído', matriculas: 90, cargaHoraria: 120, receita: 40000, impactoSocial: false },
          { id: 5, um: 'UM-05 Eletroeletrônica', area: 'Eletroeletrônica', escola: 'SENAI Catalão', municipio: 'Catalão', inicio: '2026-06-25', fim: '2026-07-05', status: 'Manutenção', matriculas: 0, cargaHoraria: 0, receita: 0, impactoSocial: false },
          { id: 6, um: 'UM-06 Automotiva', area: 'Automotiva', escola: 'SENAI Itumbiara', municipio: 'Itumbiara', inicio: '2026-08-01', fim: '2026-09-30', status: 'Agendado', matriculas: 60, cargaHoraria: 240, receita: 80000, impactoSocial: false },
          { id: 7, um: 'UM-01 Confecção', area: 'Vestuário', escola: 'SENAI Trindade', municipio: 'Trindade', inicio: '2026-08-01', fim: '2026-09-15', status: 'Agendado', matriculas: 100, cargaHoraria: 160, receita: 40000, impactoSocial: true },
        ];

        const STATUS_COLORS = {
          'Agendado': '#3b82f6', 
          'Em Andamento': '#10b981', 
          'Concluído': '#6b7280', 
          'Manutenção': '#ef4444', 
        };

        const AREAS = ['Vestuário', 'Metalmecânica', 'TI', 'Alimentos', 'Eletroeletrônica', 'Automotiva', 'Construção Civil'];
        const UMS = ['UM-01 Confecção', 'UM-02 Solda', 'UM-03 Informática', 'UM-04 Panificação', 'UM-05 Eletroeletrônica', 'UM-06 Automotiva', 'UM-07 Indústria 4.0'];

        const FROTA_DATA = [
          { cod: 'U.M. Soldagem', unidade: 'SOLDAGEM', origem: 'BNDS', status: 'OPERACIONAL', placa: 'JFP-8605', categoria: 'CARRETA', tempo: 11, ar: 2 },
          { cod: 'U.M. Panificação', unidade: 'PANIFICAÇÃO', origem: 'BNDS', status: 'OPERACIONAL', placa: 'JKF-9711', categoria: 'CARRETA', tempo: 11, ar: 4 },
          { cod: 'U.M. Panificação Básica', unidade: 'MULTIFUNCIONAL 5 - CARRETA E', origem: 'SENAI GO', status: 'REFORMA', placa: 'KBX-5501', categoria: 'CARRETA', tempo: 39, ar: 2 },
          { cod: 'U.M. Refrigeração', unidade: 'MULTIFUNCIONAL 4 - CARRETA D', origem: 'SENAI GO', status: 'REFORMA', placa: 'KBZ-4221', categoria: 'CARRETA', tempo: 41, ar: 2 },
          { cod: 'U.M. Instalações Elétricas', unidade: 'MULTIFUNCIONAL 3 - CARRETA C', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'KBZ-4611', categoria: 'CARRETA', tempo: 41, ar: 2 },
          { cod: 'U.M. Mecânica Diesel', unidade: 'MULTIFUNCIONAL 6 - CARRETA F', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'KCG-5255', categoria: 'CARRETA', tempo: 41, ar: 2 },
          { cod: 'U.M. Mec. Motocicletas', unidade: 'MULTIFUNCIONAL 7 - CARRETA G', origem: 'SENAI GO', status: 'REFORMA', placa: 'KDL-3081', categoria: 'CARRETA', tempo: 25, ar: 2 },
          { cod: 'U.M. - Módulo ESCOLA MÓVEL', unidade: 'ESCOLA MÓVEL - CONTÊINERS', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'ND', categoria: 'CONTEINERS', tempo: 2024, ar: 5 },
          { cod: 'U.M. Educon SESI', unidade: 'Multifuncional SESI EDUCON', origem: 'SESI GO', status: 'OPERACIONAL', placa: 'OGU-2707', categoria: 'CAMINHÃO', tempo: 12, ar: 2 },
          { cod: 'CAVALO MECÂNICO', unidade: 'CAMINHÃO VW 19.330 ADVANTECH', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'OMW-0073', categoria: 'CAVALO MEC.', tempo: 10, ar: 0 },
          { cod: 'U.M. Mecânica Industrial', unidade: 'MANUTENÇÃO INDUSTRIAL', origem: 'BNDS', status: 'OPERACIONAL', placa: 'OZW-6455', categoria: 'CARRETA', tempo: 9, ar: 4 },
          { cod: 'U.M. Manut. Máquinas Agrícolas', unidade: 'MANUT. MÁQUINAS AGRÍCOLAS', origem: 'BNDS', status: 'MANUTENÇÃO', placa: 'PAC-9658', categoria: 'CARRETA', tempo: 9, ar: 4 },
          { cod: 'U.M. Multi 2 - simples', unidade: 'MULTIFUNCIONAL 1 - CARRETA A', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'SDK0J77', categoria: 'CARRETA', tempo: 2024, ar: 2 },
          { cod: 'U.M. Multi 1 - com avanço', unidade: 'MULTIFUNCIONAL 2 - CARRETA B', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'SDK1A17', categoria: 'CARRETA', tempo: 2024, ar: 4 }
        ];

        const MESES_OPCOES = [
          { value: '2026-01-01', label: 'Janeiro / 2026' },
          { value: '2026-02-01', label: 'Fevereiro / 2026' },
          { value: '2026-03-01', label: 'Março / 2026' },
          { value: '2026-04-01', label: 'Abril / 2026' },
          { value: '2026-05-01', label: 'Maio / 2026' },
          { value: '2026-06-01', label: 'Junho / 2026' },
          { value: '2026-07-01', label: 'Julho / 2026' },
          { value: '2026-08-01', label: 'Agosto / 2026' },
          { value: '2026-09-01', label: 'Setembro / 2026' },
          { value: '2026-10-01', label: 'Outubro / 2026' },
          { value: '2026-11-01', label: 'Novembro / 2026' },
          { value: '2026-12-01', label: 'Dezembro / 2026' }
        ];

        const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);

        const formatDate = (dateStr) => {
          if (!dateStr) return '';
          const [y, m, d] = dateStr.split('-');
          return `${d}/${m}/${y}`;
        };

        const getDaysBetween = (start, end) => {
          const d1 = new Date(start);
          const d2 = new Date(end);
          return Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
        };

        function App() {
          const [view, setView] = useState('dashboard');
          
          const [atendimentos, setAtendimentos] = useState(() => {
            try {
              const savedData = localStorage.getItem('sigum_atendimentos');
              return savedData ? JSON.parse(savedData) : INITIAL_DATA;
            } catch (e) {
              return INITIAL_DATA;
            }
          });

          const [lastUpdated, setLastUpdated] = useState(() => {
            try {
              return localStorage.getItem('sigum_lastUpdated') || null;
            } catch (e) {
              return null;
            }
          });

          useEffect(() => {
            try {
              localStorage.setItem('sigum_atendimentos', JSON.stringify(atendimentos));
            } catch (e) {}
          }, [atendimentos]);

          useEffect(() => {
            if (lastUpdated) {
              try {
                localStorage.setItem('sigum_lastUpdated', lastUpdated);
              } catch (e) {}
            }
          }, [lastUpdated]);

          const recordUpdate = () => {
            setLastUpdated(new Date().toLocaleString('pt-BR'));
          };

          const [searchTerm, setSearchTerm] = useState('');
          
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [editingItem, setEditingItem] = useState(null);
          const [deleteConfirmId, setDeleteConfirmId] = useState(null);
          
          const [formData, setFormData] = useState({
            um: '', area: '', escola: '', municipio: '', inicio: '', fim: '', status: 'Agendado', matriculas: 0, cargaHoraria: 0, receita: 0, impactoSocial: false
          });

          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          const kpis = useMemo(() => {
            return atendimentos.reduce((acc, curr) => {
              if (curr.status !== 'Manutenção' && curr.status !== 'Cancelado') {
                acc.matriculas += Number(curr.matriculas) || 0;
                acc.cargaHoraria += Number(curr.cargaHoraria) || 0;
                acc.receita += Number(curr.receita) || 0;
              }
              acc.total++;
              if (curr.status === 'Em Andamento') acc.ativos++;
              return acc;
            }, { total: 0, ativos: 0, matriculas: 0, cargaHoraria: 0, receita: 0 });
          }, [atendimentos]);

          const chartDataArea = useMemo(() => {
            const data = {};
            atendimentos.forEach(a => {
              if (!data[a.area]) data[a.area] = { name: a.area, Atendimentos: 0, matriculas: 0, receita: 0, cargaHoraria: 0 };
              data[a.area].Atendimentos++;
              data[a.area].matriculas += Number(a.matriculas) || 0;
              data[a.area].receita += Number(a.receita) || 0;
              data[a.area].cargaHoraria += Number(a.cargaHoraria) || 0;
            });
            return Object.values(data).sort((a, b) => b.Atendimentos - a.Atendimentos);
          }, [atendimentos]);

          const chartDataStatus = useMemo(() => {
            const data = {};
            atendimentos.forEach(a => {
              if (!data[a.status]) data[a.status] = { name: a.status, value: 0, matriculas: 0, receita: 0, cargaHoraria: 0, color: STATUS_COLORS[a.status] };
              data[a.status].value++;
              data[a.status].matriculas += Number(a.matriculas) || 0;
              data[a.status].receita += Number(a.receita) || 0;
              data[a.status].cargaHoraria += Number(a.cargaHoraria) || 0;
            });
            return Object.values(data);
          }, [atendimentos]);

          const chartDataUM = useMemo(() => {
            const data = {};
            atendimentos.forEach(a => {
              const shortName = a.um.split(' ')[0];
              if (!data[shortName]) data[shortName] = { name: shortName, fullName: a.um, matriculas: 0, receita: 0, Atendimentos: 0 };
              data[shortName].Atendimentos++;
              data[shortName].matriculas += Number(a.matriculas) || 0;
              data[shortName].receita += Number(a.receita) || 0;
            });
            return Object.values(data).sort((a,b) => a.name.localeCompare(b.name));
          }, [atendimentos]);

          const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
              const data = payload[0].payload;
              return (
                <div className="bg-white p-4 border border-slate-200 shadow-xl rounded-xl text-sm min-w-[220px] z-50">
                  <p className="font-bold text-slate-800 mb-3 border-b border-slate-100 pb-2">{data.fullName || label || data.name}</p>
                  <div className="space-y-2">
                    <p className="flex justify-between items-center text-slate-600"><span className="font-medium text-slate-800 mr-4">Qtd. Atendimentos:</span> <span>{data.Atendimentos || data.value}</span></p>
                    <p className="flex justify-between items-center text-slate-600"><span className="font-medium text-slate-800 mr-4">Matrículas:</span> <span>{data.matriculas?.toLocaleString('pt-BR') || 0}</span></p>
                    <p className="flex justify-between items-center text-slate-600"><span className="font-medium text-slate-800 mr-4">Carga Horária:</span> <span>{data.cargaHoraria ? `${data.cargaHoraria.toLocaleString('pt-BR')}h` : '0h'}</span></p>
                    <p className="flex justify-between items-center text-slate-600"><span className="font-medium text-slate-800 mr-4">Receita Prevista:</span> <span className="font-semibold text-emerald-600">{formatCurrency(data.receita || 0)}</span></p>
                  </div>
                </div>
              );
            }
            return null;
          };

          const handleOpenModal = (item = null) => {
            if (item && item.id) {
              setEditingItem(item.id);
              setFormData({ ...item });
            } else if (item && !item.id) {
              setEditingItem(null);
              setFormData({
                um: item.um || '', area: item.area || '', escola: '', municipio: '', inicio: '', fim: '', status: 'Agendado', matriculas: item.matriculas || 0, cargaHoraria: item.cargaHoraria || 0, receita: item.receita || 0, impactoSocial: false
              });
            } else {
              setEditingItem(null);
              setFormData({
                um: '', area: '', escola: '', municipio: '', inicio: '', fim: '', status: 'Agendado', matriculas: 0, cargaHoraria: 0, receita: 0, impactoSocial: false
              });
            }
            setIsModalOpen(true);
          };

          const handleSave = (e) => {
            e.preventDefault();
            setAtendimentos(prev => {
              if (editingItem) {
                return prev.map(a => a.id === editingItem ? { ...formData, id: editingItem } : a);
              } else {
                return [...prev, { ...formData, id: Date.now() }];
              }
            });
            recordUpdate(); // Salva a data exata da modificação
            setIsModalOpen(false);
          };

          const confirmDelete = (id) => {
            setDeleteConfirmId(id);
          };

          const executeDelete = () => {
            setAtendimentos(prev => prev.filter(a => a.id !== deleteConfirmId));
            setDeleteConfirmId(null);
            recordUpdate(); // Salva a data exata da modificação
          };

          const filteredAtendimentos = atendimentos.filter(a => 
            a.um.toLowerCase().includes(searchTerm.toLowerCase()) || 
            a.escola.toLowerCase().includes(searchTerm.toLowerCase()) ||
            a.municipio.toLowerCase().includes(searchTerm.toLowerCase())
          );

          const DashboardView = () => (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center space-x-4">
                  <div className="p-3 bg-blue-100 text-blue-700 rounded-lg"><i className="fa-solid fa-truck text-2xl"></i></div>
                  <div>
                    <p className="text-sm text-slate-500 font-medium">U.Ms em Operação</p>
                    <p className="text-2xl font-bold text-slate-800">{kpis.ativos} <span className="text-sm font-normal text-slate-400">/ {UMS.length}</span></p>
                  </div>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center space-x-4">
                  <div className="p-3 bg-emerald-100 text-emerald-700 rounded-lg"><i className="fa-solid fa-users text-2xl"></i></div>
                  <div>
                    <p className="text-sm text-slate-500 font-medium">Total Matrículas (Proj.)</p>
                    <p className="text-2xl font-bold text-slate-800">{kpis.matriculas.toLocaleString('pt-BR')}</p>
                  </div>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center space-x-4">
                  <div className="p-3 bg-amber-100 text-amber-700 rounded-lg"><i className="fa-solid fa-clock text-2xl"></i></div>
                  <div>
                    <p className="text-sm text-slate-500 font-medium">Carga Horária (h)</p>
                    <p className="text-2xl font-bold text-slate-800">{kpis.cargaHoraria.toLocaleString('pt-BR')}</p>
                  </div>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center space-x-4">
                  <div className="p-3 bg-indigo-100 text-indigo-700 rounded-lg"><i className="fa-solid fa-dollar-sign text-2xl px-1"></i></div>
                  <div>
                    <p className="text-sm text-slate-500 font-medium">Receita Estimada</p>
                    <p className="text-2xl font-bold text-slate-800">{formatCurrency(kpis.receita)}</p>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col">
                  <h3 className="text-lg font-semibold text-slate-800 mb-1 flex items-center"><i className="fa-solid fa-chart-column mr-2 text-slate-500"></i> Atendimentos por Área</h3>
                  <p className="text-xs text-slate-500 mb-4">Passe o mouse nas barras para ver receita, matrículas e horas.</p>
                  <div className="flex-1 w-full min-h-[300px]">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={chartDataArea} margin={{ top: 20, right: 10, left: -20, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                        <XAxis dataKey="name" tick={{fontSize: 12}} interval={0} angle={-35} textAnchor="end" height={60} />
                        <YAxis tick={{fontSize: 12}} />
                        <RechartsTooltip content={<CustomTooltip />} cursor={{fill: '#f1f5f9'}} />
                        <Bar dataKey="Atendimentos" fill="#0284c7" radius={[4, 4, 0, 0]}>
                          <LabelList dataKey="Atendimentos" position="top" fill="#475569" fontSize={12} fontWeight={600} />
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col">
                  <h3 className="text-lg font-semibold text-slate-800 mb-1 flex items-center"><i className="fa-solid fa-chart-pie mr-2 text-slate-500"></i> Status da Frota</h3>
                  <p className="text-xs text-slate-500 mb-4">Detalhamento de volume e valores retidos em cada status.</p>
                  <div className="flex-1 w-full min-h-[300px] flex items-center justify-center">
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart margin={{ top: 0, right: 0, left: 0, bottom: 0 }}>
                        <Pie
                          data={chartDataStatus}
                          cx="50%"
                          cy="50%"
                          innerRadius={65}
                          outerRadius={95}
                          paddingAngle={5}
                          dataKey="value"
                          labelLine={true}
                          label={({ name, percent }) => `${name} (${(percent * 100).toFixed(0)}%)`}
                        >
                          {chartDataStatus.map((entry, index) => (
                            <Cell key={`cell-${index}`} fill={entry.color} />
                          ))}
                        </Pie>
                        <RechartsTooltip content={<CustomTooltip />} />
                        <Legend verticalAlign="bottom" height={36}/>
                      </PieChart>
                    </ResponsiveContainer>
                  </div>
                </div>
                
                <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 lg:col-span-2">
                  <h3 className="text-lg font-semibold text-slate-800 mb-1 flex items-center"><i className="fa-solid fa-truck mr-2 text-slate-500"></i> Desempenho por Unidade Móvel</h3>
                  <p className="text-xs text-slate-500 mb-4">Visão financeira e de volume de matrículas em cada carreta.</p>
                  <div className="w-full h-64">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={chartDataUM} margin={{ top: 20, right: 10, left: 20, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                        <XAxis dataKey="name" tick={{fontSize: 12}} />
                        <YAxis tick={{fontSize: 12}} tickFormatter={(value) => `R$ ${value/1000}k`} />
                        <RechartsTooltip content={<CustomTooltip />} cursor={{fill: '#f1f5f9'}} />
                        <Bar dataKey="receita" fill="#10b981" radius={[4, 4, 0, 0]} name="Receita (R$)">
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>
            </div>
          );

          const ReservasView = () => (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden animate-in fade-in duration-500">
              <div className="p-4 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div className="relative w-full sm:w-96">
                  <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input 
                    type="text" 
                    placeholder="Buscar por U.M, Escola ou Município..." 
                    className="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow"
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                </div>
                <div className="flex space-x-2 w-full sm:w-auto">
                  <button className="flex items-center justify-center px-4 py-2 border border-slate-300 rounded-lg text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 w-full sm:w-auto transition-colors">
                    <i className="fa-solid fa-filter mr-2"></i> Filtros
                  </button>
                  <button 
                    onClick={() => handleOpenModal()}
                    className="flex items-center justify-center px-4 py-2 bg-[#ED1C24] text-white rounded-lg text-sm font-medium hover:bg-red-700 w-full sm:w-auto shadow-sm transition-colors"
                  >
                    <i className="fa-solid fa-plus mr-2"></i> Nova Reserva
                  </button>
                </div>
              </div>

              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse">
                  <thead>

          const GanttView = () => {
            // Estados para os filtros
            const [ganttFilterUM, setGanttFilterUM] = useState('');
            const [ganttFilterStatus, setGanttFilterStatus] = useState('');
            const [ganttStartDate, setGanttStartDate] = useState('2026-06-01');
            
            const [tooltipPos, setTooltipPos] = useState({ x: 0, y: 0 });

            // Aplicação dos filtros nas unidades e atendimentos
            const filteredUMs = ganttFilterUM ? UMS.filter(u => u === ganttFilterUM) : UMS;
            const filteredGanttAtendimentos = atendimentos.filter(a => {
              if (ganttFilterStatus && a.status !== ganttFilterStatus) return false;
              return true;
            });

            // Geração Dinâmica dos Meses (4 meses a partir da data base selecionada)
            const timelineStart = new Date(`${ganttStartDate}T00:00:00`); 
            const months = [];
            for(let i=0; i<4; i++) {
              let d = new Date(timelineStart.getFullYear(), timelineStart.getMonth() + i, 1);
              months.push({ name: d.toLocaleString('pt-BR', { month: 'short' }).toUpperCase(), year: d.getFullYear(), days: new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate() });
            }
            
            const totalDaysTimeline = months.reduce((acc, m) => acc + m.days, 0);
            const todayReal = new Date();
            const timeDiffToToday = todayReal.getTime() - timelineStart.getTime();
            const daysExactToToday = timeDiffToToday / (1000 * 60 * 60 * 24);
            const todayLeftPercent = (daysExactToToday / totalDaysTimeline) * 100;
            const isTodayInView = todayLeftPercent >= 0 && todayLeftPercent <= 100;

            const handleMouseMove = (e) => {
              setTooltipPos({ x: e.clientX, y: e.clientY });

                          <option value="">Todos os Status</option>
                          {Object.keys(STATUS_COLORS).map(s => <option key={s} value={s}>{s}</option>)}

                      <select className="p-2 bg-white border border-slate-300 rounded-lg text-xs font-medium text-slate-700 focus:ring-2 focus:ring-blue-500 shadow-sm"

                      </div>

                      {months.map((m, i) => (
                        <div key={i} className="border-r border-slate-200 flex items-center justify-center text-xs font-semibold text-slate-500" style={{ width: `${(m.days / totalDaysTimeline) * 100}%`}}>

                      {months.map((m, i) => {

                        return <div key={i} className="absolute top-0 bottom-0 border-l border-slate-100 z-0" style={{ left: `${(prevDays / totalDaysTimeline) * 100}%` }}></div>;

                              if (end.getTime() < timelineStart.getTime()) return null;

                              const visualStart = start.getTime() < timelineStart.getTime() ? timelineStart : start;
                              const daysFromStart = getDaysBetween(timelineStart, visualStart);
                              const duration = getDaysBetween(visualStart, end);
                              
                              const leftPercent = (daysFromStart / totalDaysTimeline) * 100;
                              const widthPercent = (duration / totalDaysTimeline) * 100;

                                <div

                                  style={{ left: `${Math.max(0, leftPercent)}%`, width: `${widthPercent}%`, backgroundColor: STATUS_COLORS[atend.status] }}

                                </div>
                              );

                          </div>
                        );

                </div>

            const simulacao = window.React.useMemo(() => {
              const umObj = FROTA_DATA.find(u => u.cod === simUM);

              if (umObj) {
                cat = umObj.categoria;

                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Data de Início</label>
                        <input required type="date" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                          value={formData.inicio} onChange={e => setFormData({...formData, inicio: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Data de Término</label>
                        <input required type="date" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                          value={formData.fim} onChange={e => setFormData({...formData, fim: e.target.value})} />
                      </div>
                      <div className="col-span-1 sm:col-span-2 pt-4 border-t border-slate-200 mt-2">
                        <h4 className="text-sm font-semibold text-slate-800 mb-4">Indicadores de Desempenho</h4>
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Previsão de Matrículas</label>
                        <input type="number" min="0" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                          value={formData.matriculas} onChange={e => setFormData({...formData, matriculas: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Carga Horária Total (h)</label>
                        <input type="number" min="0" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                          value={formData.cargaHoraria} onChange={e => setFormData({...formData, cargaHoraria: e.target.value})} />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Receita Estimada (R$)</label>
                        <input type="number" min="0" step="0.01" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                          value={formData.receita} onChange={e => setFormData({...formData, receita: e.target.value})} />
                      </div>
                      <div className="flex items-center mt-6">
                        <label className="flex items-center cursor-pointer">
                          <input type="checkbox" className="sr-only peer" checked={formData.impactoSocial} onChange={e => setFormData({...formData, impactoSocial: e.target.checked})} />
                          <div className="w-11 h-6 bg-slate-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                          <span className="ml-3 text-sm font-medium text-slate-700">Ação de Impacto Social / Gratuita</span>
                        </label>
                      </div>
                    </form>
                  </div>
                  
                  <div className="p-5 border-t border-slate-200 bg-slate-50 flex justify-end space-x-3">
                    <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2.5 border border-slate-300 rounded-lg text-sm font-medium text-slate-700 bg-white hover:bg-slate-100 transition-colors">
                      Cancelar
                    </button>
                    <button type="submit" form="reserva-form" className="px-5 py-2.5 bg-[#005CAA] text-white rounded-lg text-sm font-medium hover:bg-blue-800 transition-colors shadow-sm flex items-center">
                      <i className="fa-solid fa-check mr-2"></i> Salvar {editingItem ? 'Alterações' : 'Reserva'}
                    </button>
                  </div>
                </div>
              </div>
            );
          };

          const ModalExclusao = () => {
            if (!deleteConfirmId) return null;
            return (
              <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-sm p-6 text-center">
                  <i className="fa-solid fa-triangle-exclamation text-4xl text-red-500 mb-4"></i>
                  <h3 className="text-lg font-bold text-slate-800 mb-2">Confirmar Exclusão</h3>
                  <p className="text-sm text-slate-500 mb-6">Tem certeza que deseja excluir este atendimento? Esta ação não pode ser desfeita.</p>
                  <div className="flex justify-center space-x-3">
                    <button onClick={() => setDeleteConfirmId(null)} className="px-4 py-2 border border-slate-300 rounded-lg text-sm font-medium text-slate-700 bg-white hover:bg-slate-50">Cancelar</button>
                    <button onClick={executeDelete} className="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 shadow-sm">Sim, Excluir</button>
                  </div>
                </div>
              </div>
            );
          };

          return (
            <div className="min-h-screen flex font-sans text-slate-900">
              <aside className="hidden md:flex flex-col w-64 bg-[#002f5c] text-white shadow-xl z-20">
                <div className="p-4 border-b border-white/10 flex items-center justify-center bg-white">
                  <img 
                    src="https://i.postimg.cc/0Nh7xNQL/LOGO-UNIDADES-MOVEIS-SESI-2025.png" 
                    alt="Logo SESI SENAI Unidades Móveis" 
                    className="w-full h-auto max-h-16 object-contain"
                  />
                </div>
                <nav className="flex-1 p-4 space-y-2">
                  <button onClick={() => setView('dashboard')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'dashboard' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-chart-line text-lg mr-3 w-5"></i> Dashboard CMOV
                  </button>
                  <button onClick={() => setView('reservas')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'reservas' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-calendar-days text-lg mr-3 w-5"></i> Calendário / Reservas
                  </button>
                  <button onClick={() => setView('gantt')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'gantt' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-truck text-lg mr-3 w-5"></i> Monitoramento Frota
                  </button>
                  <button onClick={() => setView('frota')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'frota' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-truck-fast text-lg mr-3 w-5"></i> Quadro da Frota
                  </button>
                  <button onClick={() => setView('simulacao')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'simulacao' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-calculator text-lg mr-3 w-5"></i> Simulador Contrato
                  </button>
                </nav>
              </aside>

              <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                <header className="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-4 sm:px-6 z-10 shrink-0 shadow-sm">
                  <div className="flex items-center">
                    <button className="md:hidden p-2 -ml-2 text-slate-500 hover:bg-slate-100 rounded-lg mr-2" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                      <i className="fa-solid fa-bars text-xl"></i>
                    </button>
                    <h2 className="text-lg font-bold text-[#002f5c] hidden sm:block">SIGUM - Sistema de Gestão de Unidades Móveis</h2>
                    <h2 className="text-lg font-bold text-[#002f5c] sm:hidden">SIGUM</h2>
                  </div>

                  <div className="flex items-center space-x-4">
                     <div className="md:hidden flex items-center bg-slate-100 rounded-full px-3 py-1 border border-slate-200">
                       <span className="w-2 h-2 rounded-full bg-emerald-500 mr-2"></span>
                       <span className="text-xs font-semibold text-slate-600">Admin</span>
                     </div>
                    <div className="w-8 h-8 rounded-full bg-[#005CAA] text-white flex items-center justify-center font-bold text-sm shadow-inner cursor-pointer hover:ring-2 ring-offset-2 ring-blue-500 transition">
                      AD
                    </div>
                  </div>
                </header>

                {isMobileMenuOpen && (
                  <div className="absolute top-16 left-0 right-0 bg-[#002f5c] text-white shadow-xl z-20 md:hidden animate-in slide-in-from-top-2 border-b border-[#001529]">
                    <nav className="flex flex-col p-2 space-y-1">
                      <button onClick={() => {setView('dashboard'); setIsMobileMenuOpen(false)}} className={`p-3 text-left rounded-lg text-sm font-medium ${view === 'dashboard' ? 'bg-[#005CAA]' : ''}`}><i className="fa-solid fa-chart-line mr-2"></i> Dashboard</button>
                      <button onClick={() => {setView('reservas'); setIsMobileMenuOpen(false)}} className={`p-3 text-left rounded-lg text-sm font-medium ${view === 'reservas' ? 'bg-[#005CAA]' : ''}`}><i className="fa-solid fa-calendar-days mr-2"></i> Reservas</button>
                      <button onClick={() => {setView('gantt'); setIsMobileMenuOpen(false)}} className={`p-3 text-left rounded-lg text-sm font-medium ${view === 'gantt' ? 'bg-[#005CAA]' : ''}`}><i className="fa-solid fa-truck mr-2"></i> Gantt Frota</button>
                      <button onClick={() => {setView('frota'); setIsMobileMenuOpen(false)}} className={`p-3 text-left rounded-lg text-sm font-medium ${view === 'frota' ? 'bg-[#005CAA]' : ''}`}><i className="fa-solid fa-truck-fast mr-2"></i> Quadro da Frota</button>
                      <button onClick={() => {setView('simulacao'); setIsMobileMenuOpen(false)}} className={`p-3 text-left rounded-lg text-sm font-medium ${view === 'simulacao' ? 'bg-[#005CAA]' : ''}`}><i className="fa-solid fa-calculator mr-2"></i> Simulador Contrato</button>
                    </nav>
                  </div>
                )}

                <div className="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-50/50">
                  <div className="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                      <h2 className="text-2xl font-bold text-slate-800">
                        {view === 'dashboard' && 'Visão Geral CMOV'}
                        {view === 'reservas' && 'Gestão de Reservas U.M'}
                        {view === 'gantt' && 'Monitoramento e Cronograma'}
                        {view === 'frota' && 'Status Operacional da Frota'}
                        {view === 'simulacao' && 'Simulador de Contratos'}
                      </h2>
                      <p className="text-slate-500 text-sm mt-1">Acompanhe e gerencie a frota de unidades móveis do SENAI Goiás.</p>
                      
                      {}
                      <div className="mt-3 inline-flex items-center px-2.5 py-1 rounded-md bg-blue-50 border border-blue-100 text-xs font-medium text-blue-700 shadow-sm">
                        <i className="fa-solid fa-cloud-arrow-down mr-1.5"></i>
                        {lastUpdated ? `Última edição local: ${lastUpdated}` : 'Modo de visualização padrão'}
                      </div>
                    </div>
                    {view === 'dashboard' && (
                      <button className="flex items-center px-4 py-2 bg-white border border-slate-300 shadow-sm rounded-lg text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
                        <i className="fa-solid fa-file-excel mr-2 text-green-600"></i> Exportar Relatório
                      </button>
                    )}
                  </div>

                  {view === 'dashboard' && <DashboardView />}
                  {view === 'reservas' && <ReservasView />}
                  {view === 'gantt' && <GanttView />}
                  {view === 'frota' && <FrotaView />}
                  {view === 'simulacao' && <SimulacaoView />}
                </div>
              </main>

              <ModalCadastro />
              <ModalExclusao />
            </div>
          );
        }

        const root = window.ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
