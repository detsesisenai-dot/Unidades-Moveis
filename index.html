<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGUM - Gestão U.Móveis SENAI</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (UMD - Navegador) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel para compilação do JSX em tempo real no navegador -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    
    <!-- Dependências essenciais do Recharts para evitar o erro 'ForwardRef' -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>

    <!-- Recharts -->
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js" crossorigin></script>
</head>
<body class="bg-slate-100 overflow-hidden text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-presets="env" data-plugins="transform-react-jsx">
        const { useState, useMemo, useEffect } = window.React;
        const { 
          BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, ResponsiveContainer,
          PieChart, Pie, Cell, LabelList
        } = window.Recharts;

        // Constants and Data
        const ESCOLAS_SENAI = [
            "FATEC SENAI Ítalo Bologna", "SENAI Vila Canaã", "SENAI Anápolis", 
            "SENAI Rio Verde", "SENAI Catalão", "SENAI Itumbiara", "SENAI Trindade",
            "SENAI Aparecida de Goiânia", "SENAI Niquelândia", "SENAI Minaçu", "SENAI Quirinópolis"
        ];

        const STATUS_COLORS = {
          'Agendado': '#3b82f6', 
          'Em Andamento': '#10b981', 
          'Concluído': '#6b7280', 
          'Manutenção': '#ef4444', 
        };

        const FROTA_DATA = [
          { cod: 'Soldagem', unidade: 'SOLDAGEM', area: 'Metalmecânica', origem: 'BNDS', status: 'OPERACIONAL', placa: 'JFP-8605', categoria: 'CARRETA', tempo: 11, ar: 2 },
          { cod: 'Panificação', unidade: 'PANIFICAÇÃO', area: 'Alimentos', origem: 'BNDS', status: 'OPERACIONAL', placa: 'JKF-9711', categoria: 'CARRETA', tempo: 11, ar: 4 },
          { cod: 'Panificação Básica', unidade: 'MULTIFUNCIONAL 5 - CARRETA E', area: 'Alimentos', origem: 'SENAI GO', status: 'REFORMA', placa: 'KBX-5501', categoria: 'CARRETA', tempo: 39, ar: 2 },
          { cod: 'Refrigeração', unidade: 'MULTIFUNCIONAL 4 - CARRETA D', area: 'Refrigeração', origem: 'SENAI GO', status: 'REFORMA', placa: 'KBZ-4221', categoria: 'CARRETA', tempo: 41, ar: 2 },
          { cod: 'Instalações Elétricas', unidade: 'MULTIFUNCIONAL 3 - CARRETA C', area: 'Eletroeletrônica', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'KBZ-4611', categoria: 'CARRETA', tempo: 41, ar: 2 },
          { cod: 'Mecânica Diesel', unidade: 'MULTIFUNCIONAL 6 - CARRETA F', area: 'Automotiva', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'KCG-5255', categoria: 'CARRETA', tempo: 41, ar: 2 },
          { cod: 'Mec. Motocicletas', unidade: 'MULTIFUNCIONAL 7 - CARRETA G', area: 'Automotiva', origem: 'SENAI GO', status: 'REFORMA', placa: 'KDL-3081', categoria: 'CARRETA', tempo: 25, ar: 2 },
          { cod: 'Módulo ESCOLA MÓVEL', unidade: 'ESCOLA MÓVEL - CONTÊINERS', area: 'Multidisciplinar', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'ND', categoria: 'CONTEINERS', tempo: 2024, ar: 5 },
          { cod: 'Educon SESI', unidade: 'Multifuncional SESI EDUCON', area: 'Educação Básica', origem: 'SESI GO', status: 'OPERACIONAL', placa: 'OGU-2707', categoria: 'CAMINHÃO', tempo: 12, ar: 2 },
          { cod: 'CAVALO MECÂNICO', unidade: 'CAMINHÃO VW 19.330 ADVANTECH', area: 'Logística', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'OMW-0073', categoria: 'CAVALO MEC.', tempo: 10, ar: 0 },
          { cod: 'Mecânica Industrial', unidade: 'MANUTENÇÃO INDUSTRIAL', area: 'Metalmecânica', origem: 'BNDS', status: 'OPERACIONAL', placa: 'OZW-6455', categoria: 'CARRETA', tempo: 9, ar: 4 },
          { cod: 'Manut. Máquinas Agrícolas', unidade: 'MANUT. MÁQUINAS AGRÍCOLAS', area: 'Mecânica Agrícola', origem: 'BNDS', status: 'MANUTENÇÃO', placa: 'PAC-9658', categoria: 'CARRETA', tempo: 9, ar: 4 },
          { cod: 'Multi 2 - simples', unidade: 'MULTIFUNCIONAL 1 - CARRETA A', area: 'Multidisciplinar', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'SDK0J77', categoria: 'CARRETA', tempo: 2024, ar: 2 },
          { cod: 'Multi 1 - com avanço', unidade: 'MULTIFUNCIONAL 2 - CARRETA B', area: 'Multidisciplinar', origem: 'SENAI GO', status: 'OPERACIONAL', placa: 'SDK1A17', categoria: 'CARRETA', tempo: 2024, ar: 4 }
        ];

        const INITIAL_DATA = [
          { id: 1, um: 'Soldagem', area: 'Metalmecânica', escola: 'FATEC SENAI Ítalo Bologna', municipio: 'Goiânia', inicio: '2026-06-10', fim: '2026-07-20', status: 'Em Andamento', matriculas: 120, cargaHoraria: 160, receita: 64000, impactoSocial: false },
          { id: 2, um: 'Panificação', area: 'Alimentos', escola: 'SENAI Vila Canaã', municipio: 'Aparecida de Goiânia', inicio: '2026-06-01', fim: '2026-06-30', status: 'Em Andamento', matriculas: 80, cargaHoraria: 200, receita: 80000, impactoSocial: false },
          { id: 3, um: 'Módulo ESCOLA MÓVEL', area: 'Multidisciplinar', escola: 'SENAI Anápolis', municipio: 'Anápolis', inicio: '2026-07-05', fim: '2026-08-15', status: 'Agendado', matriculas: 150, cargaHoraria: 80, receita: 32000, impactoSocial: true },
          { id: 4, um: 'Mecânica Diesel', area: 'Automotiva', escola: 'SENAI Rio Verde', municipio: 'Rio Verde', inicio: '2026-05-15', fim: '2026-06-15', status: 'Concluído', matriculas: 90, cargaHoraria: 120, receita: 48000, impactoSocial: false },
        ];

        const MESES_OPCOES = [
          { value: '2026-01-01', label: 'Janeiro / 2026' }, { value: '2026-02-01', label: 'Fevereiro / 2026' },
          { value: '2026-03-01', label: 'Março / 2026' }, { value: '2026-04-01', label: 'Abril / 2026' },
          { value: '2026-05-01', label: 'Maio / 2026' }, { value: '2026-06-01', label: 'Junho / 2026' },
          { value: '2026-07-01', label: 'Julho / 2026' }, { value: '2026-08-01', label: 'Agosto / 2026' },
          { value: '2026-09-01', label: 'Setembro / 2026' }, { value: '2026-10-01', label: 'Outubro / 2026' },
          { value: '2026-11-01', label: 'Novembro / 2026' }, { value: '2026-12-01', label: 'Dezembro / 2026' }
        ];

        const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        const formatDate = (dateStr) => {
          if (!dateStr) return '';
          const [y, m, d] = dateStr.split('-');
          return `${d}/${m}/${y}`;
        };
        const getDaysBetween = (start, end) => {
          const d1 = new Date(start);
          const d2 = new Date(end);
          return Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24));
        };

        const evaluateStatus = (inicio, fim, manualStatus) => {
            if (manualStatus === 'Manutenção') return 'Manutenção';
            
            const today = new Date();
            today.setHours(0,0,0,0);
            const startDate = new Date(`${inicio}T00:00:00`);
            const endDate = new Date(`${fim}T00:00:00`);

            if (endDate < today) return 'Concluído';
            if (startDate <= today && endDate >= today) return 'Em Andamento';
            return 'Agendado';
        };

        function App() {
          const [view, setView] = useState('dashboard');
          const [isAdmin, setIsAdmin] = useState(false); // Toggle for CMOV specific views
          
          const [atendimentos, setAtendimentos] = useState(() => {
            try {
              const savedData = localStorage.getItem('sigum_atendimentos');
              if (savedData) {
                  let parsed = JSON.parse(savedData);
                  // Force status evaluation on load & patch legacy names (Remover 'U.M. ')
                  return parsed.map(a => {
                      let cleanedUM = a.um || '';
                      cleanedUM = cleanedUM.replace(/^U\.M\.\s-\s/, '').replace(/^U\.M\.\s/, '');
                      return {...a, um: cleanedUM, status: evaluateStatus(a.inicio, a.fim, a.status)};
                  });
              }
              return INITIAL_DATA;
            } catch (e) {
              return INITIAL_DATA;
            }
          });

          const [lastUpdated, setLastUpdated] = useState(() => localStorage.getItem('sigum_lastUpdated') || null);
          const [searchTerm, setSearchTerm] = useState('');
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [deleteConfirmId, setDeleteConfirmId] = useState(null);

          useEffect(() => {
            try {
              localStorage.setItem('sigum_atendimentos', JSON.stringify(atendimentos));
            } catch (e) {}
          }, [atendimentos]);

          useEffect(() => {
            if (lastUpdated) localStorage.setItem('sigum_lastUpdated', lastUpdated);
          }, [lastUpdated]);

          const recordUpdate = () => setLastUpdated(new Date().toLocaleString('pt-BR'));

          const kpis = useMemo(() => {
            return atendimentos.reduce((acc, curr) => {
              if (curr.status !== 'Manutenção' && curr.status !== 'Cancelado') {
                acc.matriculas += Number(curr.matriculas) || 0;
                acc.cargaHoraria += Number(curr.cargaHoraria) || 0;
                acc.receita += Number(curr.receita) || 0;
              }
              acc.total++;
              if (curr.status === 'Em Andamento') acc.ativos++;
              return acc;
            }, { total: 0, ativos: 0, matriculas: 0, cargaHoraria: 0, receita: 0 });
          }, [atendimentos]);

          const chartDataArea = useMemo(() => {
            const data = {};
            atendimentos.forEach(a => {
              if (!data[a.area]) data[a.area] = { name: a.area, Atendimentos: 0, matriculas: 0, receita: 0, cargaHoraria: 0 };
              data[a.area].Atendimentos++;
              data[a.area].matriculas += Number(a.matriculas) || 0;
              data[a.area].receita += Number(a.receita) || 0;
              data[a.area].cargaHoraria += Number(a.cargaHoraria) || 0;
            });
            return Object.values(data).sort((a, b) => b.Atendimentos - a.Atendimentos);
          }, [atendimentos]);

          const chartDataStatus = useMemo(() => {
            const data = {};
            atendimentos.forEach(a => {
              if (!data[a.status]) data[a.status] = { name: a.status, value: 0, matriculas: 0, receita: 0, cargaHoraria: 0, color: STATUS_COLORS[a.status] };
              data[a.status].value++;
              data[a.status].matriculas += Number(a.matriculas) || 0;
              data[a.status].receita += Number(a.receita) || 0;
              data[a.status].cargaHoraria += Number(a.cargaHoraria) || 0;
            });
            return Object.values(data);
          }, [atendimentos]);

          const chartDataUM = useMemo(() => {
            const data = {};
            atendimentos.forEach(a => {
              const shortName = a.um;
              if (!data[shortName]) data[shortName] = { name: shortName, fullName: a.um, matriculas: 0, receita: 0, Atendimentos: 0 };
              data[shortName].Atendimentos++;
              data[shortName].matriculas += Number(a.matriculas) || 0;
              data[shortName].receita += Number(a.receita) || 0;
            });
            return Object.values(data).sort((a,b) => a.name.localeCompare(b.name));
          }, [atendimentos]);

          const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
              const data = payload[0].payload;
              return (
                <div className="bg-white p-4 border border-slate-200 shadow-xl rounded-xl text-sm min-w-[220px] z-50">
                  <p className="font-bold text-slate-800 mb-3 border-b border-slate-100 pb-2">{data.fullName || label || data.name}</p>
                  <div className="space-y-2">
                    <p className="flex justify-between items-center text-slate-600"><span className="font-medium text-slate-800 mr-4">Qtd. Atendimentos:</span> <span>{data.Atendimentos || data.value}</span></p>
                    <p className="flex justify-between items-center text-slate-600"><span className="font-medium text-slate-800 mr-4">Matrículas:</span> <span>{data.matriculas?.toLocaleString('pt-BR') || 0}</span></p>
                    <p className="flex justify-between items-center text-slate-600"><span className="font-medium text-slate-800 mr-4">Carga Horária:</span> <span>{data.cargaHoraria ? `${data.cargaHoraria.toLocaleString('pt-BR')}h` : '0h'}</span></p>
                    <p className="flex justify-between items-center text-slate-600"><span className="font-medium text-slate-800 mr-4">Receita Prevista:</span> <span className="font-semibold text-emerald-600">{formatCurrency(data.receita || 0)}</span></p>
                  </div>
                </div>
              );
            }
            return null;
          };

          const DashboardView = () => (
            <div className="space-y-6 animate-in fade-in duration-500">
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center space-x-4">
                  <div className="p-3 bg-blue-100 text-blue-700 rounded-lg"><i className="fa-solid fa-truck text-2xl"></i></div>
                  <div>
                    <p className="text-sm text-slate-500 font-medium">U.Ms em Operação</p>
                    <p className="text-2xl font-bold text-slate-800">{kpis.ativos} <span className="text-sm font-normal text-slate-400">/ {FROTA_DATA.length}</span></p>
                  </div>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center space-x-4">
                  <div className="p-3 bg-emerald-100 text-emerald-700 rounded-lg"><i className="fa-solid fa-users text-2xl"></i></div>
                  <div>
                    <p className="text-sm text-slate-500 font-medium">Total Matrículas</p>
                    <p className="text-2xl font-bold text-slate-800">{kpis.matriculas.toLocaleString('pt-BR')}</p>
                  </div>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center space-x-4">
                  <div className="p-3 bg-amber-100 text-amber-700 rounded-lg"><i className="fa-solid fa-clock text-2xl"></i></div>
                  <div>
                    <p className="text-sm text-slate-500 font-medium">Carga Horária (h)</p>
                    <p className="text-2xl font-bold text-slate-800">{kpis.cargaHoraria.toLocaleString('pt-BR')}</p>
                  </div>
                </div>
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex items-center space-x-4">
                  <div className="p-3 bg-indigo-100 text-indigo-700 rounded-lg"><i className="fa-solid fa-dollar-sign text-2xl px-1"></i></div>
                  <div>
                    <p className="text-sm text-slate-500 font-medium">Receita Estimada</p>
                    <p className="text-2xl font-bold text-slate-800">{formatCurrency(kpis.receita)}</p>
                  </div>
                </div>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col">
                  <h3 className="text-lg font-semibold text-slate-800 mb-1 flex items-center"><i className="fa-solid fa-chart-column mr-2 text-slate-500"></i> Atendimentos por Área</h3>
                  <div className="flex-1 w-full min-h-[300px]">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={chartDataArea} margin={{ top: 20, right: 10, left: -20, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                        <XAxis dataKey="name" tick={{fontSize: 12}} interval={0} angle={-35} textAnchor="end" height={60} />
                        <YAxis tick={{fontSize: 12}} />
                        <RechartsTooltip content={<CustomTooltip />} cursor={{fill: '#f1f5f9'}} />
                        <Bar dataKey="Atendimentos" fill="#0284c7" radius={[4, 4, 0, 0]}>
                          <LabelList dataKey="Atendimentos" position="top" fill="#475569" fontSize={12} fontWeight={600} />
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col">
                  <h3 className="text-lg font-semibold text-slate-800 mb-1 flex items-center"><i className="fa-solid fa-chart-pie mr-2 text-slate-500"></i> Status da Frota</h3>
                  <div className="flex-1 w-full min-h-[300px] flex items-center justify-center">
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart margin={{ top: 0, right: 0, left: 0, bottom: 0 }}>
                        <Pie
                          data={chartDataStatus}
                          cx="50%"
                          cy="50%"
                          innerRadius={65}
                          outerRadius={95}
                          paddingAngle={5}
                          dataKey="value"
                          labelLine={true}
                          label={({ name, percent }) => `${name} (${(percent * 100).toFixed(0)}%)`}
                        >
                          {chartDataStatus.map((entry, index) => (
                            <Cell key={`cell-${index}`} fill={entry.color} />
                          ))}
                        </Pie>
                        <RechartsTooltip content={<CustomTooltip />} />
                        <Legend verticalAlign="bottom" height={36}/>
                      </PieChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              </div>
            </div>
          );

          const ModalCadastro = () => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [formData, setFormData] = useState({
              um: '', escola: '', municipio: '', inicio: '', fim: '', matriculas: 0, cargaHoraria: 0, receita: 0, impactoSocial: false, statusOverride: ''
            });

            // Listen for custom event to open modal from other components (like Simulacao)
            useEffect(() => {
                const handleOpen = (e) => {
                    if (e.detail && e.detail.item) {
                        setEditingItem(e.detail.item.id);
                        setFormData({ ...e.detail.item, statusOverride: e.detail.item.status === 'Manutenção' ? 'Manutenção' : '' });
                    } else if (e.detail && e.detail.prefill) {
                        setEditingItem(null);
                        setFormData({ ...e.detail.prefill, statusOverride: '' });
                    } else {
                        setEditingItem(null);
                        setFormData({ um: '', escola: '', municipio: '', inicio: '', fim: '', matriculas: 0, cargaHoraria: 0, receita: 0, impactoSocial: false, statusOverride: '' });
                    }
                    setIsModalOpen(true);
                };
                window.addEventListener('openModalCadastro', handleOpen);
                return () => window.removeEventListener('openModalCadastro', handleOpen);
            }, []);

            if (!isModalOpen) return null;

            const handleSaveForm = (e) => {
                e.preventDefault();
                
                // Lookup area based on UM
                const umData = FROTA_DATA.find(u => u.cod === formData.um);
                const area = umData ? umData.area : 'Indefinida';

                // Determine final status
                const finalStatus = evaluateStatus(formData.inicio, formData.fim, formData.statusOverride);

                const finalData = {
                    ...formData,
                    area: area,
                    status: finalStatus
                };

                setAtendimentos(prev => {
                  if (editingItem) {
                    return prev.map(a => a.id === editingItem ? { ...finalData, id: editingItem } : a);
                  } else {
                    return [...prev, { ...finalData, id: Date.now() }];
                  }
                });
                recordUpdate();
                setIsModalOpen(false);
            };

            const autoStatusPreview = evaluateStatus(formData.inicio, formData.fim, formData.statusOverride);

            return (
              <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-2xl shadow-xl w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh]">
                  <div className="p-5 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                    <h2 className="text-xl font-bold text-slate-800 flex items-center">
                      {editingItem ? <i className="fa-solid fa-pen mr-2 text-blue-600"></i> : <i className="fa-solid fa-plus mr-2 text-[#ED1C24]"></i>}
                      {editingItem ? 'Editar Atendimento' : 'Nova Solicitação de U.Móvel'}
                    </h2>
                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-200 transition">
                      <i className="fa-solid fa-xmark text-xl"></i>
                    </button>
                  </div>
                  
                  <div className="p-6 overflow-y-auto flex-1">
                    <form id="reserva-form" onSubmit={handleSaveForm} className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                      <div className="col-span-1 sm:col-span-2">
                        <label className="block text-sm font-medium text-slate-700 mb-1">Escola Solicitante / Cliente</label>
                        <select required className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white"
                          value={formData.escola} onChange={e => setFormData({...formData, escola: e.target.value})}>
                          <option value="">Selecione a Escola...</option>
                          {ESCOLAS_SENAI.map(esc => <option key={esc} value={esc}>{esc}</option>)}
                        </select>
                      </div>
                      
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Unidade Móvel Requerida</label>
                        <select required className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                          value={formData.um} onChange={e => setFormData({...formData, um: e.target.value})}>
                          <option value="">Selecione...</option>
                          {FROTA_DATA.map(u => <option key={u.cod} value={u.cod}>{u.cod}</option>)}
                        </select>
                        <p className="text-xs text-slate-500 mt-1">Área tecnológica vinculada automaticamente.</p>
                      </div>
                      
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Município de Destino</label>
                        <input required type="text" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                          value={formData.municipio} onChange={e => setFormData({...formData, municipio: e.target.value})} placeholder="Digite a cidade" />
                      </div>
                      
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Data de Início</label>
                        <input required type="date" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                          value={formData.inicio} onChange={e => setFormData({...formData, inicio: e.target.value})} />
                      </div>

                          <td className="p-3">
                            <p className="text-slate-800 font-medium">{frota.unidade}</p>
                            <p className="text-xs text-slate-500 uppercase">{frota.origem}</p>
                          </td>
                          <td className="p-3 text-center">
                            <span className={`inline-flex items-center px-3 py-1 rounded-full text-xs font-bold border ${
                              frota.status === 'OPERACIONAL' ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 
                              frota.status === 'REFORMA' ? 'bg-amber-100 text-amber-700 border-amber-200' : 
                              'bg-red-100 text-red-700 border-red-200'
                            }`}>
                              {frota.status}
                            </span>
                          </td>
                          <td className="p-3">
                            <p className="text-slate-800 font-mono font-medium">{frota.placa}</p>
                            <p className="text-xs text-slate-500">{frota.categoria}</p>
                          </td>
                          <td className="p-3 text-center text-slate-800 font-medium">{frota.tempo}</td>
                          <td className="p-3 text-center text-slate-800 font-medium">{frota.ar}</td>
                        </tr>
                      ))}
                      {filteredFrotaLocal.length === 0 && (
                        <tr>
                          <td colSpan="6" className="p-8 text-center text-slate-500">
                            <i className="fa-solid fa-truck-slash text-5xl text-slate-300 mb-3 block mx-auto"></i>
                            Nenhuma Unidade da Frota encontrada com estes filtros.
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          };

          const SimulacaoView = () => {
            const [simUM, setSimUM] = useState('');
            const [simHoras, setSimHoras] = useState(160);
            const [simBase, setSimBase] = useState(400); // Valor hora base
            const [simAdicional, setSimAdicional] = useState(0);

            const simulacao = useMemo(() => {
              const umObj = FROTA_DATA.find(u => u.cod === simUM);
              const subtotal = Number(simHoras) * Number(simBase);
              const total = subtotal + Number(simAdicional);

              return { umObj, subtotal, total };
            }, [simUM, simHoras, simBase, simAdicional]);

            const agendarSimulacao = () => {
              window.dispatchEvent(new CustomEvent('openModalCadastro', { 
                  detail: { 
                      prefill: {
                        um: simulacao.umObj ? simulacao.umObj.cod : '',
                        cargaHoraria: simHoras,
                        receita: simulacao.total,
                        matriculas: 0,
                        escola: '', municipio: '', inicio: '', fim: '', impactoSocial: false
                      }
                  } 
              }));
            };

            return (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in fade-in duration-500">
                <div className="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                  <h3 className="text-lg font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2"><i className="fa-solid fa-calculator text-blue-600 mr-2"></i> Parâmetros da Simulação</h3>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div className="md:col-span-2">
                      <label className="block text-sm font-medium text-slate-700 mb-1">Unidade Móvel Requerida</label>
                      <select className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-slate-50"
                        value={simUM} onChange={e => setSimUM(e.target.value)}>
                        <option value="">Selecione uma Unidade da Frota...</option>
                        {FROTA_DATA.map(u => <option key={u.cod} value={u.cod}>{u.cod} ({u.categoria})</option>)}
                      </select>
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Carga Horária Locada (h)</label>
                      <input type="number" min="1" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                        value={simHoras} onChange={e => setSimHoras(e.target.value)} />
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Valor da Hora (R$ / h)</label>
                      <input type="number" step="0.01" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                        value={simBase} onChange={e => setSimBase(e.target.value)} />
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Custos Logísticos/Adicionais (R$)</label>
                      <input type="number" step="0.01" className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500" 
                        value={simAdicional} onChange={e => setSimAdicional(e.target.value)} />
                    </div>
                  </div>
                </div>

                <div className="bg-[#002f5c] rounded-xl shadow-lg border border-[#001529] p-6 text-white flex flex-col relative overflow-hidden">
                  <div className="absolute top-0 right-0 p-4 opacity-10">
                     <i className="fa-solid fa-file-invoice-dollar text-9xl"></i>
                  </div>
                  <h3 className="text-lg font-bold text-blue-200 mb-4 border-b border-white/10 pb-2 relative z-10">Resumo da Cotação</h3>
                  
                  <div className="flex-1 space-y-4 relative z-10">
                    <div className="flex justify-between items-center text-sm border-b border-white/10 pb-4">
                      <span className="text-blue-100">Cálculo Base (Hora x CH):</span>
                      <span className="font-medium">{formatCurrency(simulacao.subtotal)}</span>
                    </div>
                    <div className="flex justify-between items-center text-sm border-b border-white/10 pb-4">
                      <span className="text-blue-100">Logística/Deslocamento:</span>
                      <span className="font-medium text-emerald-300">+{formatCurrency(simAdicional)}</span>
                    </div>
                    
                    <div className="pt-2">
                      <p className="text-xs text-blue-300 uppercase tracking-wider mb-1">Preço Final Estimado</p>
                      <p className="text-3xl font-black text-white">{formatCurrency(simulacao.total)}</p>
                    </div>
                  </div>

                  <button 
                    onClick={agendarSimulacao}
                    className="w-full mt-6 bg-[#ED1C24] hover:bg-red-700 text-white font-bold py-3 rounded-lg shadow-md transition-colors flex justify-center items-center relative z-10">
                    <i className="fa-solid fa-calendar-check mr-2"></i> Converter em Reserva
                  </button>
                </div>
              </div>
            );
          };

          const executeDelete = () => {
            setAtendimentos(prev => prev.filter(a => a.id !== deleteConfirmId));
            setDeleteConfirmId(null);
            recordUpdate();
          };

          return (
            <div className="min-h-screen flex font-sans text-slate-900">
              <aside className="hidden md:flex flex-col w-64 bg-[#002f5c] text-white shadow-xl z-20">
                <div className="p-4 border-b border-white/10 flex items-center justify-center bg-white">
                  <img src="https://i.postimg.cc/0Nh7xNQL/LOGO-UNIDADES-MOVEIS-SESI-2025.png" alt="Logo SESI SENAI Unidades Móveis" className="w-full h-auto max-h-16 object-contain" />
                </div>
                <nav className="flex-1 p-4 space-y-2">
                  <button onClick={() => setView('dashboard')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'dashboard' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-chart-line text-lg mr-3 w-5"></i> Dashboard CMOV
                  </button>
                  <button onClick={() => setView('reservas')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'reservas' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-calendar-days text-lg mr-3 w-5"></i> Calendário / Reservas
                  </button>
                  <button onClick={() => setView('gantt')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'gantt' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-truck text-lg mr-3 w-5"></i> Monitoramento Frota
                  </button>
                  <button onClick={() => setView('frota')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'frota' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-truck-fast text-lg mr-3 w-5"></i> Quadro da Frota
                  </button>
                  <button onClick={() => setView('simulacao')} className={`w-full flex items-center px-4 py-3 rounded-lg text-sm font-medium transition-colors ${view === 'simulacao' ? 'bg-[#005CAA] text-white' : 'text-blue-100 hover:bg-white/10'}`}>
                    <i className="fa-solid fa-calculator text-lg mr-3 w-5"></i> Simulador Contrato
                  </button>
                </nav>
              </aside>

              <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                <header className="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-4 sm:px-6 z-10 shrink-0 shadow-sm">
                  <div className="flex items-center">
                    <button className="md:hidden p-2 -ml-2 text-slate-500 hover:bg-slate-100 rounded-lg mr-2" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                      <i className="fa-solid fa-bars text-xl"></i>
                    </button>
                    <h2 className="text-lg font-bold text-[#002f5c] hidden sm:block">SIGUM - Sistema de Gestão de Unidades Móveis</h2>
                  </div>

                  <div className="flex items-center space-x-4">
                     <label className="hidden md:flex items-center cursor-pointer px-3 py-1 bg-slate-100 rounded-full border border-slate-200">
                        <span className="text-xs font-semibold text-slate-600 mr-2">Acesso CMOV</span>
                        <input type="checkbox" className="sr-only peer" checked={isAdmin} onChange={e => setIsAdmin(e.target.checked)} />
                        <div className="w-8 h-4 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-[#005CAA] relative"></div>
                     </label>
                    <div className="w-8 h-8 rounded-full bg-[#005CAA] text-white flex items-center justify-center font-bold text-sm shadow-inner">
                      {isAdmin ? 'AD' : 'ES'}
                    </div>
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto p-4 sm:p-6 bg-slate-50/50">
                  <div className="mb-6">
                      <h2 className="text-2xl font-bold text-slate-800">
                        {view === 'dashboard' && 'Visão Geral CMOV'}
                        {view === 'reservas' && 'Gestão de Reservas U.M'}
                        {view === 'gantt' && 'Monitoramento e Cronograma'}
                        {view === 'frota' && 'Status Operacional da Frota'}
                        {view === 'simulacao' && 'Simulador de Contratos'}
                      </h2>
                      <p className="text-slate-500 text-sm mt-1">Acompanhe e gerencie a frota de unidades móveis do SENAI Goiás.</p>
                      {lastUpdated && <div className="mt-2 inline-block px-2 py-1 bg-blue-50 text-blue-700 text-xs rounded border border-blue-100"><i className="fa-solid fa-cloud-arrow-down mr-1"></i> Dados locais atualizados em: {lastUpdated}</div>}
                  </div>

                  {view === 'dashboard' && <DashboardView />}
                  {view === 'reservas' && <ReservasView />}
                  {view === 'gantt' && <GanttView />}
                  {view === 'frota' && <FrotaView />}
                  {view === 'simulacao' && <SimulacaoView />}
                </div>
              </main>
              
              <ModalCadastro />
              
              {deleteConfirmId && (
              <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                <div className="bg-white rounded-xl shadow-xl w-full max-w-sm p-6 text-center">
                  <i className="fa-solid fa-triangle-exclamation text-4xl text-red-500 mb-4"></i>
                  <h3 className="text-lg font-bold text-slate-800 mb-2">Confirmar Exclusão</h3>
                  <p className="text-sm text-slate-500 mb-6">Tem certeza que deseja excluir este atendimento?</p>
                  <div className="flex justify-center space-x-3">
                    <button onClick={() => setDeleteConfirmId(null)} className="px-4 py-2 border border-slate-300 rounded-lg text-sm font-medium text-slate-700 bg-white hover:bg-slate-50">Cancelar</button>
                    <button onClick={executeDelete} className="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 shadow-sm">Sim, Excluir</button>
                  </div>
                </div>
              </div>
              )}
            </div>
          );
        }

        const root = window.ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
